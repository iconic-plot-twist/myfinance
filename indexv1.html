let S = { ...JSON.parse(JSON.stringify(DEFAULT_DATA)), view:'dashboard' };

// ── Helpers ───────────────────────────────────────────────
const $=id=>document.getElementById(id);

const fmtS=n=>(n>=0?'+':'-')+fmt(n);

const catById=id=>S.categories.find(c=>c.id===id);
const spentFor=id=>S.transactions.filter(t=>t.catId===id&&t.amt<0).reduce((s,t)=>s+Math.abs(t.amt),0);
const totalBal=()=>S.accounts.reduce((s,a)=>s+a.balance,0);
const totalCCDebt=()=>S.creditCards.reduce((s,c)=>s+c.balance,0);
const totalLoanDebt=()=>S.loans.reduce((s,l)=>s+l.balance,0);
const totalInc=()=>S.transactions.filter(t=>t.amt>0).reduce((s,t)=>s+t.amt,0);
const totalExp=()=>S.transactions.filter(t=>t.amt<0).reduce((s,t)=>s+Math.abs(t.amt),0);
const pct=(a,b)=>b>0?Math.min(100,Math.round(a/b*100)):0;
const TODAY=26;
const daysUntil=d=>{let diff=d-TODAY;if(diff<0)diff+=31;return diff;};
const ordinal=d=>d+(d===1?'st':d===2?'nd':d===3?'rd':'th');

function dueBadge(d){
  if(d===0)return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-red-50 text-red-700">Today!</span>`;
  if(d===1)return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-orange-50 text-orange-700">Tomorrow</span>`;
  if(d<=5)return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-50 text-amber-700">${d} days</span>`;
  return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-50 text-green-700">${d} days</span>`;
}

function statusBadge(s,id){
  const map={
    cleared:`<span class="badge status-cleared text-xs font-semibold px-2 py-0.5 rounded-full" onclick="cycleStatus(${id})">✓ Cleared</span>`,
    pending:`<span class="badge status-pending text-xs font-semibold px-2 py-0.5 rounded-full" onclick="cycleStatus(${id})">⏳ Pending</span>`,
    progress:`<span class="badge status-progress text-xs font-semibold px-2 py-0.5 rounded-full" onclick="cycleStatus(${id})">↻ In progress</span>`
  };
  return map[s]||map.pending;
}

function cycleStatus(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  const order=['pending','progress','cleared'];
  t.status=order[(order.indexOf(t.status)+1)%order.length];
  render();
}

// ── SYNC / STORAGE ────────────────────────────────────────
let syncTimeout=null;
let syncStatus='idle'; // idle, saving, saved, error, offline

function getSaveData(){
  return {accounts:S.accounts,creditCards:S.creditCards,loans:S.loans,categories:S.categories,bills:S.bills,transactions:S.transactions,nextId:S.nextId};
}

function saveLocal(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(getSaveData()));}
  catch(e){console.warn('Local save failed',e);}
}

function loadLocal(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    ['accounts','creditCards','loans','categories','bills','transactions','nextId'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    return true;
  }catch(e){return false;}
}

async function saveToSheets(){
  if(!SCRIPT_URL)return;
  try{
    setSyncStatus('saving');
    const res=await fetch(SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify({data:getSaveData()}),
    });
    const json=await res.json();
    if(json.success){setSyncStatus('saved');}
    else{setSyncStatus('error');}
  }catch(e){
    setSyncStatus('offline');
  }
}

async function loadFromSheets(){
  if(!SCRIPT_URL)return false;
  try{
    setSyncStatus('saving');
    const res=await fetch(`${SCRIPT_URL}?action=load`);
    const json=await res.json();
    if(json.success&&json.data&&Object.keys(json.data).length>0){
      ['accounts','creditCards','loans','categories','bills','transactions','nextId'].forEach(k=>{if(json.data[k]!==undefined)S[k]=json.data[k];});
      saveLocal();
      setSyncStatus('saved');
      return true;
    }
    setSyncStatus('idle');
    return false;
  }catch(e){
    setSyncStatus('offline');
    return false;
  }
}

function setSyncStatus(status){
  syncStatus=status;
  const el=$('sync-status');
  if(!el)return;
  const map={
    saving:{text:'⟳ Syncing...',cls:'bg-blue-100 text-blue-700'},
    saved:{text:'✓ Saved',cls:'bg-green-100 text-green-700'},
    error:{text:'⚠ Sync error',cls:'bg-red-100 text-red-700'},
    offline:{text:'● Offline — saved locally',cls:'bg-amber-100 text-amber-700'},
    idle:{text:'',cls:''}
  };
  const m=map[status]||map.idle;
  if(m.text){
    el.textContent=m.text;
    el.className=`fixed top-3 right-4 text-xs font-medium px-3 py-1.5 rounded-full z-40 shadow-sm ${m.cls}`;
    el.classList.remove('hidden');
    if(status==='saved'){setTimeout(()=>{el.classList.add('hidden');},2000);}
  }else{
    el.classList.add('hidden');
  }
  updateSidebarFooter();
}

function scheduleSave(){
  saveLocal();
  if(syncTimeout)clearTimeout(syncTimeout);
  syncTimeout=setTimeout(()=>saveToSheets(),1500);
}

function updateSidebarFooter(){
  const sf=$('sidebar-footer');
  if(!sf)return;
  const connected=!!SCRIPT_URL;
  sf.innerHTML=`
    <div class="mb-1">${connected?'<span class="text-emerald-500">● Connected to Google Sheets</span>':'<span class="text-amber-500">● Local only — not syncing</span>'}</div>
    ${!connected?`<button onclick="openSetup()" class="text-xs underline text-stone-400 hover:text-stone-600">Connect Google Sheets</button><br>`:''}
    <button onclick="forcSync()" class="text-xs underline text-stone-400 hover:text-stone-600 mt-1">Force sync</button>
    <button onclick="clearAllData()" class="block text-xs underline text-stone-300 hover:text-red-400 mt-1">Reset all data</button>
  `;
}

async function forcSync(){
  await saveToSheets();
}

// ── NAV ───────────────────────────────────────────────────
function buildSidebarNav(){
  const el=$('sidebar-nav');
  if(!el)return;
  el.innerHTML=NAV_ITEMS.map(item=>{
    if(item.section)return`<div class="px-5 py-2 text-[10px] font-semibold tracking-widest uppercase text-stone-400 mt-1">${item.section}</div>`;
    return`<div class="nav-item flex items-center gap-2.5 px-5 py-2.5 text-sm font-medium text-stone-500 cursor-pointer border-l-2 border-transparent hover:text-stone-900 hover:bg-stone-50" data-view="${item.view}" onclick="nav('${item.view}')">${item.icon} ${item.label}</div>`;
  }).join('');
}

function nav(v){
  S.view=v;
  document.querySelectorAll('[data-view]').forEach(el=>{
    const active=el.dataset.view===v;
    if(el.classList.contains('nav-item')){
      el.classList.toggle('text-stone-900',active);
      el.classList.toggle('bg-stone-50',active);
      el.classList.toggle('border-stone-900',active);
      el.classList.toggle('text-stone-500',!active);
      el.classList.toggle('border-transparent',!active);
    }
    if(el.dataset.mobile){
      el.classList.toggle('text-stone-900',active);
      el.classList.toggle('text-stone-400',!active);
    }
  });
  render();
  // Close mobile menu if open
  const mm=$('mobile-menu-modal');
  if(mm)mm.remove();
}

function render(){
  const views={dashboard:vDash,accounts:vAccounts,envelopes:vEnvelopes,transactions:vTxns,bills:vBills,creditcards:vCreditCards,loans:vLoans,paycheck:vPaycheck,forecast:vForecast,advice:vAdvice};
  $('main').innerHTML=(views[S.view]||vDash)();
  afterRender();
  scheduleSave();
}

function afterRender(){
  const pc=$('pc-amt');
  if(pc)pc.addEventListener('input',updateAllocTotal);

// ── VIEWS ─────────────────────────────────────────────────
function vDash(){
  const nw=totalBal()-totalCCDebt()-totalLoanDebt(),bal=totalBal(),ccD=totalCCDebt(),loanD=totalLoanDebt();

function vForecast(){
  const day=26,dim=31,exp=totalExp(),inc=totalInc(),daily=exp/day,projTotal=Math.round(daily*dim*100)/100,projSav=inc-projTotal;
  const months=[{l:'Jan',v:800},{l:'Feb',v:1100},{l:'Mar',v:projSav,cur:true},{l:'Apr',v:projSav*1.03},{l:'May',v:projSav*1.06},{l:'Jun',v:projSav*1.1}];
  const maxV=Math.max(...months.map(m=>Math.abs(m.v)),1);
  return`${sectionHeader('Forecast','Projections based on current pace',null,null)}
  <div class="grid grid-cols-4 gap-3 mb-5 metrics">
    ${metricCard('Daily spend',fmt(daily)+'/day',day+' days of data','border-amber-400')}
    ${metricCard('Projected expenses',`<span class="text-red-500">${fmt(projTotal)}</span>`,'by end of March','border-red-400')}
    ${metricCard('Projected savings',`<span class="${projSav>=0?'text-emerald-600':'text-red-500'}">${fmtS(projSav)}</span>`,'end of March',projSav>=0?'border-emerald-400':'border-red-400')}
    ${metricCard('Total debt',`<span class="text-amber-600">${fmt(totalCCDebt()+totalLoanDebt())}</span>`,'CCs + loans','border-violet-400')}
  </div>
  <div class="bg-white rounded-xl border border-stone-100 shadow-sm p-5 mb-4">
    <div class="text-[10px] font-semibold uppercase tracking-widest text-stone-400 mb-4">6-month savings trajectory</div>
    <div class="flex items-end gap-3 h-32 mb-3">${months.map(m=>{const h=Math.max(8,Math.round(Math.abs(m.v)/maxV*100));return`<div class="flex-1 flex flex-col items-center gap-1.5"><span class="text-[10px] mono text-stone-400">${fmt(m.v)}</span><div class="w-full rounded-t-md" style="height:${h}px;background:${m.cur?'#3b82f6':m.v>=0?'#a7f3d0':'#fecaca'}"></div><span class="text-xs ${m.cur?'font-semibold':'text-stone-400'}">${m.l}</span></div>`;}).join('')}</div>
    <p class="text-xs text-stone-400 text-center">Blue = current month · Apr–Jun assumes similar patterns</p>
  </div>
  <div class="bg-white rounded-xl border border-stone-100 shadow-sm p-5">
    <div class="text-[10px] font-semibold uppercase tracking-widest text-stone-400 mb-4">Category forecasts</div>
    ${S.categories.map(c=>{const sp=spentFor(c.id),proj=Math.round(sp/day*dim*100)/100,over=proj>c.allocated,p=pct(proj,c.allocated);
    return`<div class="flex items-center gap-3 mb-2.5">
      <div class="flex items-center gap-2 w-36 flex-shrink-0"><div class="w-2 h-2 rounded-full" style="background:${c.color}"></div><span class="text-sm font-medium truncate">${c.name}</span></div>
      <div class="flex-1 h-2 bg-stone-100 rounded-full overflow-hidden"><div class="h-full rounded-full bar-fill" style="width:${p}%;background:${over?'#ef4444':c.color}"></div></div>
      <span class="mono text-xs w-16 text-right ${over?'text-red-500':'text-emerald-600'}">${fmt(proj)}</span>
      <span class="text-xs font-semibold px-2 py-0.5 rounded-full w-16 text-center ${over?'bg-red-50 text-red-700':'bg-emerald-50 text-emerald-700'}">${over?'▲ over':'✓ ok'}</span>
    </div>`;}).join('')}
  </div>`;
}

function vAdvice(){
  const ccD=totalCCDebt(),loanD=totalLoanDebt(),bal=totalBal(),exp=totalExp(),inc=totalInc(),sav=inc-exp;
  const highCC=[...S.creditCards].filter(c=>pct(c.balance,c.limit)>50).sort((a,b)=>b.balance-a.balance);
  const noAuto=S.creditCards.filter(c=>!c.autopay&&c.balance>0);
  const util=pct(ccD,S.creditCards.reduce((s,c)=>s+c.limit,0));
  const tips=[
    {color:'#ef4444',icon:'💳',title:'High CC utilization alert',body:`Your overall utilization is ${util}% — lenders prefer under 30%. You have ${highCC.length} card${highCC.length!==1?'s':''} over 50%.`,action:highCC.length?`Focus extra payments on ${highCC[0].name} first.`:'',save:util>30?'Paying down to 30% could significantly boost your credit score.':''},
    noAuto.length?{color:'#3b82f6',icon:'🔁',title:`Set autopay on ${noAuto.length} more cards`,body:`${noAuto.slice(0,3).map(c=>c.name).join(', ')}${noAuto.length>3?` +${noAuto.length-3} more`:''} have no autopay. One missed payment = $25–40 fee + credit score hit.`,action:'Enable minimum payment autopay on each card.',save:'Avoiding one late fee/month saves ~$30–40.'}:null,
    {color:'#10b981',icon:'🏔',title:'Use the debt avalanche method',body:`With ${fmt(ccD)} in CC debt across 13 cards, pay minimums on all, then throw every extra dollar at the highest-interest card.`,action:`Start with ${highCC[0]?.name||'your highest card'}, then roll that payment to the next.`,save:'Saves the most in interest vs. spreading payments equally.'},
    sav>0?{color:'#7c3aed',icon:'💰',title:"You're saving — use it strategically",body:`On track to save ${fmt(sav)} this month with ${fmt(loanD+ccD)} in total debt.`,action:`Split: 50% toward highest-interest debt, 30% emergency fund, 20% to Maui's future.`,save:`${fmt(Math.round(sav*0.5))}/month extra could clear your personal loan under a year.`}:null,
    {color:'#ba7517',icon:'📅',title:'Payment calendar tip',body:`You have ${S.loans.filter(l=>!l.autopay).length} loans and ${noAuto.length} CCs on manual payment — a lot of dates to track.`,action:'Set phone reminders 5 days before each manual due date. Your Bills and CC pages are sorted by due date.',save:'Never miss a payment = no fees + better credit.'}
  ].filter(Boolean);
  return`${sectionHeader('Savings advice','Personalized tips based on your actual numbers',null,null)}
  <div class="grid grid-cols-3 gap-3 mb-5">
    ${metricCard('Total debt',`<span class="text-red-500">${fmt(ccD+loanD)}</span>`,'CCs + loans','border-red-400')}
    ${metricCard('Monthly savings',`<span class="${sav>=0?'text-emerald-600':'text-red-500'}">${fmtS(sav)}</span>`,'income minus expenses',sav>=0?'border-emerald-400':'border-red-400')}
    ${metricCard('Cash buffer',fmt(bal),Math.round(bal/((exp/26)*31))+' months of expenses','border-blue-400')}
  </div>
  ${tips.map(t=>`<div class="bg-white rounded-xl border border-stone-100 shadow-sm p-5 mb-3 border-l-4" style="border-left-color:${t.color}">
    <div class="flex items-center gap-2.5 mb-2"><span class="text-xl">${t.icon}</span><h3 class="text-sm font-semibold">${t.title}</h3></div>
    <p class="text-sm text-stone-500 leading-relaxed">${t.body}</p>
    ${t.action?`<p class="text-sm font-medium text-stone-700 mt-2">→ ${t.action}</p>`:''}
    ${t.save?`<p class="text-xs font-semibold mt-2" style="color:${t.color}">💡 ${t.save}</p>`:''}
  </div>`).join('')}`;
}

function addTxn(){
  const desc=$('t-desc')?.value.trim(),amt=parseFloat($('t-amt')?.value);
  if(!desc||isNaN(amt)){alert('Fill in description and amount.');return;}
  const catId=parseInt($('t-cat')?.value)||null,acctId=parseInt($('t-acct')?.value)||S.accounts[0].id;
  S.transactions.push({id:uid(),date:$('t-date')?.value,desc,catId,amt,acct:acctId,status:$('t-status')?.value||'pending',autopay:$('t-autopay')?.checked||false});
  const a=S.accounts.find(x=>x.id===acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
  render();
}
function delTxn(id){
  const t=S.transactions.find(x=>x.id===id);
  if(t){const a=S.accounts.find(x=>x.id===t.acct);if(a)a.balance=Math.round((a.balance-t.amt)*100)/100;}
  S.transactions=S.transactions.filter(x=>x.id!==id);render();
}
function deleteBill(id){if(!confirm('Delete bill?'))return;S.bills=S.bills.filter(b=>b.id!==id);render();}
function deleteCat(id){if(!confirm('Delete envelope?'))return;S.categories=S.categories.filter(c=>c.id!==id);render();}
function deleteLoan(id){if(!confirm('Delete loan?'))return;S.loans=S.loans.filter(l=>l.id!==id);render();}
function applyPaycheck(){
  const amt=parseFloat($('pc-amt')?.value)||0,acctId=parseInt($('pc-acct')?.value),date=$('pc-date')?.value;
  S.categories.forEach(c=>{const v=parseFloat($('alloc-'+c.id)?.value)||0;c.allocated=Math.round(v*100)/100;});
  const a=S.accounts.find(x=>x.id===acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
  S.transactions.push({id:uid(),date,desc:'Paycheck',catId:null,amt,acct:acctId,status:'cleared',autopay:false});
  nav('dashboard');
}
function updateAllocTotal(){
  let total=0;S.categories.forEach(c=>{total+=parseFloat($('alloc-'+c.id)?.value)||0;});
  const el=$('alloc-total');if(el)el.textContent=fmt(total);
  const amt=parseFloat($('pc-amt')?.value)||0,st=$('alloc-status');
  if(st&&amt>0){const rem=amt-total;st.textContent=rem>=0?`${fmt(rem)} unallocated`:`Over by ${fmt(Math.abs(rem))}`;st.className=`text-xs mt-1 font-medium ${rem<0?'text-red-500':'text-emerald-600'}`;}
}
function clearAllData(){if(!confirm('Reset ALL data?'))return;localStorage.removeItem(SAVE_KEY);location.reload();}
function dismissBanner(){$('setup-banner')?.classList.add('hidden');}

function addCC(){S.creditCards.push({id:uid(),name:$('cc-name')?.value.trim()||'Card',balance:parseFloat($('cc-bal')?.value)||0,limit:parseFloat($('cc-lim')?.value)||5000,due:parseInt($('cc-due')?.value)||15,minPayment:parseFloat($('cc-min')?.value)||25,autopay:$('cc-auto')?.checked||false,color:_col});closeModal();render();}

function saveCC(id){const c=S.creditCards.find(x=>x.id===id);if(!c)return;c.name=$('e-name')?.value.trim()||c.name;c.balance=parseFloat($('e-bal')?.value)||0;c.limit=parseFloat($('e-lim')?.value)||c.limit;c.due=parseInt($('e-due')?.value)||c.due;c.minPayment=parseFloat($('e-min')?.value)||c.minPayment;c.autopay=$('e-auto')?.checked||false;c.color=_col;closeModal();render();}
function deleteCC(id){if(!confirm('Delete card?'))return;S.creditCards=S.creditCards.filter(c=>c.id!==id);closeModal();render();}
function openAddLoan(){_col=PALETTE[0];modal(`${mTitle('Add loan')}<div class="space-y-3 mb-4">${iField('Name','l-name','text','e.g. Car loan','')}${iField('Lender','l-lender','text','e.g. Toyota Financial','')}<div class="grid grid-cols-2 gap-3">${iField('Balance','l-bal','number','0','')}${iField('Original amount','l-orig','number','0','')}</div><div class="grid grid-cols-2 gap-3">${iField('Monthly payment','l-pay','number','200','')}${iField('Due date (day)','l-due','number','15','')}</div><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="l-auto" class="w-4 h-4 accent-blue-500"> Autopay</label></div>${colorPick(_col)}${mFooter()}${mPrimary('Add loan','addLoan()')}`)}
function addLoan(){S.loans.push({id:uid(),name:$('l-name')?.value.trim()||'Loan',lender:$('l-lender')?.value.trim()||'',balance:parseFloat($('l-bal')?.value)||0,original:parseFloat($('l-orig')?.value)||0,payment:parseFloat($('l-pay')?.value)||0,due:parseInt($('l-due')?.value)||1,autopay:$('l-auto')?.checked||false,color:_col});closeModal();render();}
function openEditLoan(id){const l=S.loans.find(x=>x.id===id);if(!l)return;modal(`${mTitle('Edit — '+l.name)}<div class="space-y-3 mb-4">${iField('Name','e-name','text','',l.name)}${iField('Lender','e-lender','text','',l.lender)}<div class="grid grid-cols-2 gap-3">${iField('Balance','e-bal','number','',l.balance)}${iField('Payment','e-pay','number','',l.payment)}</div><div class="grid grid-cols-2 gap-3">${iField('Due date','e-due','number','',l.due)}<div class="flex items-end pb-2"><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="e-auto" ${l.autopay?'checked':''} class="w-4 h-4 accent-blue-500"> Autopay</label></div></div></div>${mFooter()}${mPrimary('Save','saveLoan('+id+')')}`)}
function saveLoan(id){const l=S.loans.find(x=>x.id===id);if(!l)return;l.name=$('e-name')?.value.trim()||l.name;l.lender=$('e-lender')?.value.trim()||l.lender;l.balance=parseFloat($('e-bal')?.value)||l.balance;l.payment=parseFloat($('e-pay')?.value)||l.payment;l.due=parseInt($('e-due')?.value)||l.due;l.autopay=$('e-auto')?.checked||false;closeModal();render();}
function openAddCat(){_col=PALETTE[Math.floor(Math.random()*PALETTE.length)];modal(`${mTitle('New envelope')}<div class="space-y-3 mb-4">${iField('Name','c-name','text','e.g. Travel fund','')}${iField('Monthly budget','c-bud','number','200','')}</div>${colorPick(_col)}${mFooter()}${mPrimary('Add','addCat()')}`)}
function addCat(){S.categories.push({id:uid(),name:$('c-name')?.value.trim()||'Category',color:_col,allocated:parseFloat($('c-bud')?.value)||0,budget:parseFloat($('c-bud')?.value)||0});closeModal();render();}
function openEditEnv(id){const c=S.categories.find(x=>x.id===id);if(!c)return;_col=c.color;modal(`${mTitle('Edit — '+c.name)}<div class="space-y-3 mb-4">${iField('Name','e-name','text','',c.name)}<div class="grid grid-cols-2 gap-3">${iField('Budget','e-bud','number','',c.budget)}${iField('Allocated','e-alloc','number','',c.allocated)}</div></div>${colorPick(c.color)}${mFooter()}${mPrimary('Save','saveEnv('+id+')')}`)}
function saveEnv(id){const c=S.categories.find(x=>x.id===id);if(!c)return;c.name=$('e-name')?.value.trim()||c.name;c.budget=parseFloat($('e-bud')?.value)||0;c.allocated=parseFloat($('e-alloc')?.value)||0;c.color=_col;closeModal();render();}
function openMoveMoney(fromId){modal(`${mTitle('Move money')}<div class="space-y-3 mb-4">${sField('From','mv-from',S.categories.map(c=>`<option value="${c.id}"${c.id===fromId?' selected':''}>${c.name} (${fmt(c.allocated)})</option>`).join(''))}${sField('To','mv-to',S.categories.filter(c=>c.id!==fromId).map(c=>`<option value="${c.id}">${c.name}</option>`).join(''))}${iField('Amount','mv-amt','number','0.00','')}</div>${mFooter()}${mPrimary('Move','doMoveMoney()')}`)}
function doMoveMoney(){const fromId=parseInt($('mv-from')?.value),toId=parseInt($('mv-to')?.value),amt=parseFloat($('mv-amt')?.value)||0;const from=S.categories.find(x=>x.id===fromId),to=S.categories.find(x=>x.id===toId);if(!from||!to||amt<=0)return;from.allocated=Math.round((from.allocated-amt)*100)/100;to.allocated=Math.round((to.allocated+amt)*100)/100;closeModal();render();}

// ── INIT ──────────────────────────────────────────────────
const fns=[nav,cycleStatus,addTxn,delTxn,deleteBill,deleteCat,deleteLoan,applyPaycheck,updateAllocTotal,
  closeModal,pickCol,openEditAcct,saveAcct,openAddAcct,addAcct,openReconcile,toggleCleared,applyReconcile,
  openAddBill,addBill,openAddCC,addCC,openEditCC,saveCC,deleteCC,openAddLoan,addLoan,openEditLoan,saveLoan,
  openAddCat,addCat,openEditEnv,saveEnv,openMoveMoney,doMoveMoney,clearAllData,openSetup,saveScriptUrl,
  dismissBanner,forcSync,openMobileMenu];
fns.forEach(f=>window[f.name]=f);

buildSidebarNav();
loadLocal();
updateSidebarFooter();

// Show setup banner if no script URL
if(!SCRIPT_URL){$('setup-banner')?.classList.remove('hidden');}

// Try to load from Google Sheets on startup
if(SCRIPT_URL){
  loadFromSheets().then(loaded=>{if(loaded)render();});
}

nav('dashboard');
</script>
