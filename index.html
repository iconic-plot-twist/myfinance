<style>
:root{--bg:#f7f6f3;--surface:#ffffff;--surface2:#f0eee9;--border:rgba(0,0,0,0.07);--text:#1a1916;--text2:#6b6860;--text3:#a8a69f;}
.dark{--bg:#0f0f0e;--surface:#1a1917;--surface2:#242320;--border:rgba(255,255,255,0.08);--text:#f5f4f0;--text2:#9a9890;--text3:#6b6860;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s;}
.mono{font-family:'DM Mono',monospace;}
.nav-item{transition:all 0.13s;}
.card-hover{transition:transform 0.15s,box-shadow 0.15s;}
.card-hover:hover{transform:translateY(-2px);}
.bar-fill{transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.badge{cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.modal-animate{animation:fadeUp 0.18s ease;}
.status-cleared{background:#f0fdf6;color:#065f46;}
.status-pending{background:#fffbeb;color:#92400e;}
.status-progress{background:#eff6ff;color:#1e40af;}
.dark .status-cleared{background:#052e1c;color:#6ee7b7;}
.dark .status-pending{background:#2d1f00;color:#fcd34d;}
.dark .status-progress{background:#0d1f3c;color:#93c5fd;}
.swatch{transition:transform 0.12s;}
.swatch:hover{transform:scale(1.15);}
.swatch.sel{outline:3px solid var(--text);transform:scale(1.15);}
.ds{background:var(--surface);border-color:var(--border);}
.ds2{background:var(--surface2);}
.dt{color:var(--text);}
.dt2{color:var(--text2);}
.dt3{color:var(--text3);}
input,select,textarea{background:var(--surface);color:var(--text);border-color:var(--border);}
/* confetti */
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
.confetti-piece{position:fixed;width:10px;height:10px;top:-20px;animation:confettiFall linear forwards;z-index:9999;pointer-events:none;}
/* mobile */
@media(max-width:768px){
  .sidebar{display:none!important;}
  .main-content{margin-left:0!important;padding:1rem!important;padding-bottom:5rem!important;}
  .mobile-nav{display:flex!important;}
  .metrics{grid-template-columns:repeat(2,1fr)!important;}
  .hide-mobile{display:none!important;}
  .tbl-wrap{overflow-x:auto;}
}
@media(min-width:769px){.mobile-nav{display:none!important;}}
.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:50;padding:6px 0 env(safe-area-inset-bottom,6px);}
/* dark mode card overrides */
.dark .bg-white{background:var(--surface)!important;}
.dark .bg-stone-50{background:var(--surface2)!important;}
.dark .border-stone-100{border-color:var(--border)!important;}
.dark .border-stone-200{border-color:var(--border)!important;}
.dark .text-stone-400{color:var(--text3)!important;}
.dark .text-stone-500{color:var(--text2)!important;}
.dark .text-stone-900{color:var(--text)!important;}
.dark .text-stone-700{color:var(--text)!important;}
.dark .text-stone-600{color:var(--text2)!important;}
.dark .hover\:bg-stone-50:hover{background:var(--surface2)!important;}
.dark .hover\:bg-stone-100:hover{background:var(--surface2)!important;}
</style>
</head>

// ── Helpers ───────────────────────────────────────────────

const fmtS=n=>(n>=0?'+':'-')+fmt(n);

const spentFor=id=>S.transactions.filter(t=>t.catId===id&&t.amt<0).reduce((s,t)=>s+Math.abs(t.amt),0);

const daysUntil=d=>{let diff=d-TODAY;if(diff<0)diff+=31;return diff;};
const ordinal=d=>d+(d===1?'st':d===2?'nd':d===3?'rd':'th');

function dueBadge(d){
  if(d===0)return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-red-50 text-red-700">Today!</span>`;
  if(d===1)return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-orange-50 text-orange-700">Tomorrow</span>`;
  if(d<=5)return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-50 text-amber-700">${d} days</span>`;
  return`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-50 text-green-700">${d} days</span>`;
}

function statusBadge(s,id){
  const map={
    cleared:`<span class="badge status-cleared text-xs font-semibold px-2 py-0.5 rounded-full" onclick="cycleStatus(${id})">✓ Cleared</span>`,
    pending:`<span class="badge status-pending text-xs font-semibold px-2 py-0.5 rounded-full" onclick="cycleStatus(${id})">⏳ Pending</span>`,
    progress:`<span class="badge status-progress text-xs font-semibold px-2 py-0.5 rounded-full" onclick="cycleStatus(${id})">↻ In progress</span>`
  };
  return map[s]||map.pending;
}

function cycleStatus(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  const order=['pending','progress','cleared'];
  t.status=order[(order.indexOf(t.status)+1)%order.length];
  render();
}

// ── DARK MODE ─────────────────────────────────────────────
function toggleDark(){
  DARK_MODE=!DARK_MODE;
  localStorage.setItem('finance_dark',DARK_MODE);
  applyDark();
}
function applyDark(){
  document.documentElement.classList.toggle('dark',DARK_MODE);
  const btn=$('dark-btn');
  if(btn)btn.textContent=DARK_MODE?'☀️':'🌙';
  const meta=$('theme-color-meta');
  if(meta)meta.content=DARK_MODE?'#0f0f0e':'#ffffff';
}

// ── PROFILE ───────────────────────────────────────────────
function switchProfile(p){
  // Save current profile data
  saveLocal();
  CURRENT_PROFILE=p;
  localStorage.setItem('finance_profile',p);
  // Load other profile
  const key=SAVE_KEY+'_'+p;
  const raw=localStorage.getItem(key);
  if(raw){
    try{
      const d=JSON.parse(raw);
      ['accounts','creditCards','loans','categories','bills','transactions','nextId'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    }catch(e){S=JSON.parse(JSON.stringify(DEFAULT_DATA));}
  } else {
    S=JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  updateProfileLabel();
  if(SCRIPT_URL)loadFromSheets();
  render();
}

function updateProfileLabel(){
  const el=$('profile-label');
  if(el)el.textContent=CURRENT_PROFILE==='mine'?'My dashboard':'Edwin\'s dashboard';
}

// ── SYNC ──────────────────────────────────────────────────
let syncTimeout=null;
function getSaveData(){return{accounts:S.accounts,creditCards:S.creditCards,loans:S.loans,categories:S.categories,bills:S.bills,transactions:S.transactions,nextId:S.nextId,forecastMonths:S.forecastMonths};}
function saveLocal(){
  try{localStorage.setItem(SAVE_KEY+'_'+CURRENT_PROFILE,JSON.stringify(getSaveData()));}
  catch(e){console.warn(e);}
}
function loadLocal(){
  try{
    const raw=localStorage.getItem(SAVE_KEY+'_'+CURRENT_PROFILE);
    if(!raw)return false;
    const d=JSON.parse(raw);
    ['accounts','creditCards','loans','categories','bills','transactions','nextId','forecastMonths'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    return true;
  }catch(e){return false;}
}

function setSyncStatus(s){
  const el=$('sync-status');if(!el)return;
  const map={saving:{t:'⟳ Syncing...',c:'bg-blue-100 text-blue-700'},saved:{t:'✓ Saved',c:'bg-green-100 text-green-700'},error:{t:'⚠ Error',c:'bg-red-100 text-red-700'},offline:{t:'● Offline',c:'bg-amber-100 text-amber-700'}};
  const m=map[s];if(!m){el.classList.add('hidden');return;}
  el.textContent=m.t;el.className=`fixed top-3 right-4 text-xs font-medium px-3 py-1.5 rounded-full z-40 shadow-sm ${m.c}`;el.classList.remove('hidden');
  if(s==='saved')setTimeout(()=>el.classList.add('hidden'),2000);
}

async function saveToSheets(){
  if(!SCRIPT_URL)return;
  setSyncStatus('saving');
  try{
    const profile=CURRENT_PROFILE;
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({data:getSaveData(),profile})});
    const j=await res.json();
    setSyncStatus(j.success?'saved':'error');
  }catch(e){setSyncStatus('offline');}
}

async function loadFromSheets(){
  if(!SCRIPT_URL)return false;
  setSyncStatus('saving');
  try{
    const res=await fetch(`${SCRIPT_URL}?action=load&profile=${CURRENT_PROFILE}`);
    const j=await res.json();
    if(j.success&&j.data&&Object.keys(j.data).length>0){
      ['accounts','creditCards','loans','categories','bills','transactions','nextId','forecastMonths'].forEach(k=>{if(j.data[k]!==undefined)S[k]=j.data[k];});
      saveLocal();setSyncStatus('saved');return true;
    }
    setSyncStatus('offline');return false;
  }catch(e){setSyncStatus('offline');return false;}
}

function scheduleSave(){saveLocal();if(syncTimeout)clearTimeout(syncTimeout);syncTimeout=setTimeout(()=>saveToSheets(),1500);}

function updateSidebarFooter(){
  const sf=$('sidebar-footer');if(!sf)return;
  const connected=!!SCRIPT_URL;
  sf.innerHTML=`<div class="mb-2">${connected?'<span class="text-emerald-500">● Syncing to Google Sheets</span>':'<span class="text-amber-500">● Local only</span>'}</div>
  <div class="flex flex-col gap-1">
    ${!connected?`<button onclick="openSetup()" class="text-xs underline hover:opacity-80">Connect Google Sheets</button>`:''}
    <button onclick="openProfileSwitch()" class="text-xs underline hover:opacity-80">Switch profile</button>
    <button onclick="forcSync()" class="text-xs underline hover:opacity-80">Force sync</button>
    <button onclick="clearAllData()" class="text-xs underline text-red-400 hover:opacity-80 mt-1">Reset data</button>

// ── TRANSACTION FILTERS ───────────────────────────────────
function getFilteredTxns(){
  const f=S.txnFilters||{};
  let txns=[...S.transactions];
  if(f.search)txns=txns.filter(t=>t.desc.toLowerCase().includes(f.search.toLowerCase()));
  if(f.status)txns=txns.filter(t=>t.status===f.status);
  if(f.type==='income')txns=txns.filter(t=>t.amt>0);
  if(f.type==='expense')txns=txns.filter(t=>t.amt<0);
  if(f.recurring==='yes')txns=txns.filter(t=>t.recurring);
  if(f.recurring==='no')txns=txns.filter(t=>!t.recurring);
  if(f.period){
    const [y,m]=f.period.split('-');
    if(m)txns=txns.filter(t=>t.date.startsWith(f.period));
    else txns=txns.filter(t=>t.date.startsWith(y));
  }
  if(f.dateFrom)txns=txns.filter(t=>t.date>=f.dateFrom);
  if(f.dateTo)txns=txns.filter(t=>t.date<=f.dateTo);
  if(f.amtMin)txns=txns.filter(t=>Math.abs(t.amt)>=parseFloat(f.amtMin));
  if(f.amtMax)txns=txns.filter(t=>Math.abs(t.amt)<=parseFloat(f.amtMax));
  return txns.sort((a,b)=>b.date.localeCompare(a.date));
}

function applyFilter(key,val){
  if(!S.txnFilters)S.txnFilters={};
  S.txnFilters[key]=val;
  render();
}

function clearFilters(){
  S.txnFilters={search:'',dateFrom:'',dateTo:'',period:'',status:'',type:'',recurring:'',amtMin:'',amtMax:''};
  render();
}

// ── RECURRING FORECAST ────────────────────────────────────
function getRecurringForecast(){
  const recurring=S.transactions.filter(t=>t.recurring);
  const months=S.forecastMonths||6;
  const future=[];
  const today=new Date(2026,2,26);
  for(let m=1;m<=months;m++){
    const dt=new Date(today.getFullYear(),today.getMonth()+m,1);
    const ym=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    recurring.forEach(t=>{
      const day=t.date.split('-')[2];
      future.push({...t,id:'f'+t.id+'_'+m,date:`${ym}-${day}`,forecast:true});
    });
  }
  return future;
}

          <th class="text-left text-[10px] font-semibold uppercase tracking-wider px-4 py-3" style="color:var(--text3)">Status</th>
          <th class="text-center text-[10px] font-semibold uppercase tracking-wider px-4 py-3 hide-mobile" style="color:var(--text3)">Auto</th>

function vCreditCards(){
  const totalDebt=totalCCDebt(),totalLimit=S.creditCards.reduce((s,c)=>s+c.limit,0),totalMin=S.creditCards.reduce((s,c)=>s+c.minPayment,0),util=pct(totalDebt,totalLimit);
  // Check for last payment cards
  const lastPaymentCCs=S.creditCards.filter(c=>c.totalPayments>0&&c.paymentsMade>=c.totalPayments-1&&c.balance>0);
  return`${sectionHeader('Credit cards',S.creditCards.length+' cards · sorted by due date · tap to edit','+ Add card','openAddCC()')}
  ${lastPaymentCCs.length?`<div class="rounded-xl border p-4 mb-4 border-l-4 border-l-yellow-400" style="background:var(--surface);border-color:var(--border)">
    <div class="flex items-center gap-2 mb-1"><span class="text-xl">🎉</span><span class="text-sm font-semibold">Almost done!</span></div>
    <p class="text-sm" style="color:var(--text2)">${lastPaymentCCs.map(c=>`<strong>${c.name}</strong>`).join(', ')} ${lastPaymentCCs.length===1?'is':'are'} on the final payment! <button onclick="fireConfetti()" class="underline text-yellow-600 hover:opacity-80">Celebrate 🎉</button></p>
  </div>`:''}
  <div class="grid grid-cols-4 gap-3 mb-4 metrics">
    ${metricCard('Total CC debt',`<span class="text-red-500">${fmt(totalDebt)}</span>`,S.creditCards.length+' cards','border-red-400')}
    ${metricCard('Total limit',fmt(totalLimit),'combined','border-stone-300')}
    ${metricCard('Utilization',`<span class="${util>30?'text-red-500':util>10?'text-amber-500':'text-emerald-500'}">${util}%</span>`,util>30?'High — aim <30%':'Healthy',util>30?'border-red-400':'border-emerald-400')}
    ${metricCard('Min payments',`<span class="text-amber-500">${fmt(totalMin)}/mo</span>`,'total minimum','border-violet-400')}
  </div>
  <div class="mb-5"><div class="flex justify-between text-xs mb-1.5" style="color:var(--text3)"><span>Overall utilization</span><span>${util}%</span></div>
  <div class="h-2.5 rounded-full overflow-hidden" style="background:var(--surface2)"><div class="h-full rounded-full bar-fill" style="width:${util}%;background:${util>30?'#ef4444':util>10?'#f59e0b':'#10b981'}"></div></div></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px">
    ${[...S.creditCards].sort((a,b)=>daysUntil(a.due)-daysUntil(b.due)).map(c=>{
      const d=daysUntil(c.due),u=pct(c.balance,c.limit);
      const isLast=c.totalPayments>0&&c.paymentsMade>=c.totalPayments-1&&c.balance>0;
      return`<div onclick="openEditCC(${c.id})" class="card-hover cursor-pointer rounded-xl border p-4 border-t-4 ${isLast?'ring-2 ring-yellow-400':''}" style="background:var(--surface);border-color:var(--border);border-top-color:${c.color}">
        ${isLast?'<div class="text-xs font-bold text-yellow-600 mb-1">🎉 Last payment!</div>':''}
        <div class="flex justify-between items-start mb-2"><span class="text-sm font-semibold">${c.name}</span>${c.autopay?'<span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded-full">🅐</span>':'<span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded-full">Manual</span>'}</div>
        <div class="text-xl font-semibold mono text-red-500">${fmt(c.balance)}</div>
        <div class="text-xs mt-0.5" style="color:var(--text3)">of ${fmt(c.limit)} · ${u}%</div>
        <div class="h-1.5 rounded-full overflow-hidden my-2" style="background:var(--surface2)"><div class="h-full rounded-full" style="width:${u}%;background:${u>80?'#ef4444':u>50?'#f59e0b':c.color}"></div></div>
        <div class="flex justify-between items-center">${dueBadge(d)}<span class="text-xs" style="color:var(--text3)">Min ${fmt(c.minPayment)}</span></div>
        ${c.totalPayments>0?`<div class="mt-2 text-xs" style="color:var(--text3)">${c.paymentsMade}/${c.totalPayments} payments made</div>`:''}
      </div>`;}).join('')}
    <button onclick="openAddCC()" class="rounded-xl border-2 border-dashed flex items-center justify-center text-sm font-medium min-h-[120px] hover:opacity-80" style="border-color:var(--border);color:var(--text3)">+ Add card</button>
  </div>`;
}

      </div>`).join('')}

function vForecast(){
  const day=26,dim=31,exp=totalExp(),inc=totalInc(),daily=exp/day,projTotal=Math.round(daily*dim*100)/100,projSav=inc-projTotal;
  const fm=S.forecastMonths||6;
  const months=[];
  for(let i=0;i<fm+2;i++){
    const d=new Date(2026,1+i,1);
    months.push({l:d.toLocaleString('en',{month:'short'}),v:i===1?projSav:projSav*(1+i*0.02),cur:i===1});
  }
  months[0]={l:'Jan',v:800,cur:false};if(months.length>1)months[1]={l:'Feb',v:1100,cur:false};if(months.length>2)months[2]={l:'Mar',v:projSav,cur:true};
  const maxV=Math.max(...months.map(m=>Math.abs(m.v)),1);
  const forecast=getRecurringForecast();
  const forecastByMonth={};
  forecast.forEach(t=>{const ym=t.date.slice(0,7);if(!forecastByMonth[ym])forecastByMonth[ym]=[];forecastByMonth[ym].push(t);});

  return`${sectionHeader('Forecast','Projections based on current pace',null,null)}
  <div class="grid grid-cols-4 gap-3 mb-5 metrics">
    ${metricCard('Daily spend',fmt(daily)+'/day',day+' days of data','border-amber-400')}
    ${metricCard('Projected expenses',`<span class="text-red-500">${fmt(projTotal)}</span>`,'by end of March','border-red-400')}
    ${metricCard('Projected savings',`<span class="${projSav>=0?'text-emerald-500':'text-red-500'}">${fmtS(projSav)}</span>`,'end of March',projSav>=0?'border-emerald-400':'border-red-400')}
    ${metricCard('Total debt',`<span class="text-amber-500">${fmt(totalCCDebt()+totalLoanDebt())}</span>`,'CCs + loans','border-violet-400')}
  </div>

  <!-- Forecast window selector -->
  <div class="rounded-xl border p-4 mb-4 flex items-center gap-4" style="background:var(--surface);border-color:var(--border)">
    <span class="text-sm font-medium">Forecast window:</span>
    ${[3,6,12].map(n=>`<button onclick="S.forecastMonths=${n};render()" class="text-sm px-4 py-1.5 rounded-lg border font-medium transition-all ${fm===n?'bg-stone-900 text-white border-stone-900':'hover:opacity-80'}" style="${fm!==n?'background:var(--surface2);border-color:var(--border)':''}">${n} months</button>`).join('')}
    <div class="flex items-center gap-2 ml-2">
      <span class="text-sm" style="color:var(--text3)">Custom:</span>
      <input type="number" min="1" max="24" value="${fm}" onchange="S.forecastMonths=parseInt(this.value)||6;render()" class="w-16 text-sm rounded-lg px-2 py-1.5 outline-none" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)">
      <span class="text-sm" style="color:var(--text3)">months</span>
    </div>
  </div>

  <div class="rounded-xl border p-5 mb-4" style="background:var(--surface);border-color:var(--border)">
    <div class="text-[10px] font-semibold uppercase tracking-widest mb-4" style="color:var(--text3)">Savings trajectory</div>
    <div class="flex items-end gap-2 h-32 mb-3">
      ${months.map(m=>{const h=Math.max(8,Math.round(Math.abs(m.v)/maxV*100));return`<div class="flex-1 flex flex-col items-center gap-1.5"><span class="text-[10px] mono" style="color:var(--text3)">${fmt(m.v)}</span><div class="w-full rounded-t-md" style="height:${h}px;background:${m.cur?'#3b82f6':m.v>=0?'#a7f3d0':'#fecaca'}"></div><span class="text-xs ${m.cur?'font-semibold':''}" style="color:${m.cur?'var(--text)':'var(--text3)'}">${m.l}</span></div>`;}).join('')}
    </div>
    <p class="text-xs text-center" style="color:var(--text3)">Blue = current month · future months assume similar patterns</p>
  </div>

  <!-- Recurring forecast -->
  ${Object.keys(forecastByMonth).length?`<div class="rounded-xl border p-5 mb-4" style="background:var(--surface);border-color:var(--border)">
    <div class="text-[10px] font-semibold uppercase tracking-widest mb-4" style="color:var(--text3)">Upcoming recurring transactions 🔁</div>
    ${Object.keys(forecastByMonth).sort().map(ym=>`
      <div class="mb-4">
        <div class="text-xs font-semibold mb-2 px-2 py-1 rounded-md inline-block" style="background:var(--surface2);color:var(--text2)">${ym}</div>
        ${forecastByMonth[ym].map(t=>{const c=catById(t.catId);return`<div class="flex items-center gap-3 py-2 border-b last:border-0" style="border-color:var(--border)">
          <span class="text-blue-400 text-xs">🔁</span>
          <div class="w-2 h-2 rounded-full" style="background:${c?c.color:'#ccc'}"></div>
          <span class="flex-1 text-sm">${t.desc}</span>
          <span class="text-xs" style="color:var(--text3)">${t.date}</span>
          <span class="mono text-sm font-semibold ${t.amt>0?'text-emerald-500':'text-red-500'}">${t.amt>0?'+':''}${fmt(t.amt)}</span>
        </div>`;}).join('')}
      </div>`).join('')}
  </div>`:''}

  <div class="rounded-xl border p-5" style="background:var(--surface);border-color:var(--border)">
    <div class="text-[10px] font-semibold uppercase tracking-widest mb-4" style="color:var(--text3)">Category forecasts</div>
    ${S.categories.map(c=>{const sp=spentFor(c.id),proj=Math.round(sp/day*dim*100)/100,over=proj>c.allocated,p=pct(proj,c.allocated);
    return`<div class="flex items-center gap-3 mb-2.5">
      <div class="flex items-center gap-2 w-36 flex-shrink-0"><div class="w-2 h-2 rounded-full" style="background:${c.color}"></div><span class="text-sm font-medium truncate">${c.name}</span></div>
      <div class="flex-1 h-2 rounded-full overflow-hidden" style="background:var(--surface2)"><div class="h-full rounded-full bar-fill" style="width:${p}%;background:${over?'#ef4444':c.color}"></div></div>
      <span class="mono text-xs w-16 text-right ${over?'text-red-500':'text-emerald-500'}">${fmt(proj)}</span>
      <span class="text-xs font-semibold px-2 py-0.5 rounded-full w-16 text-center ${over?'bg-red-50 text-red-700':'bg-emerald-50 text-emerald-700'}">${over?'▲ over':'✓ ok'}</span>
    </div>`;}).join('')}
  </div>`;
}

function vAdvice(){
  const ccD=totalCCDebt(),loanD=totalLoanDebt(),bal=totalBal(),exp=totalExp(),inc=totalInc(),sav=inc-exp;
  const highCC=[...S.creditCards].filter(c=>pct(c.balance,c.limit)>50).sort((a,b)=>b.balance-a.balance);
  const noAuto=S.creditCards.filter(c=>!c.autopay&&c.balance>0);
  const util=pct(ccD,S.creditCards.reduce((s,c)=>s+c.limit,0));
  const tips=[
    {color:'#ef4444',icon:'💳',title:'High CC utilization alert',body:`Your overall utilization is ${util}% — lenders prefer under 30%. ${highCC.length} card${highCC.length!==1?'s':''} over 50%.`,action:highCC.length?`Focus extra payments on ${highCC[0].name} first.`:'',save:util>30?'Paying down to 30% could significantly boost your credit score.':''},
    noAuto.length?{color:'#3b82f6',icon:'🔁',title:`Set autopay on ${noAuto.length} more cards`,body:`${noAuto.slice(0,3).map(c=>c.name).join(', ')}${noAuto.length>3?` +${noAuto.length-3} more`:''} have no autopay. One missed payment = $25–40 fee + score hit.`,action:'Enable minimum payment autopay on each card.',save:'Avoiding one late fee/month saves ~$30–40.'}:null,
    {color:'#10b981',icon:'🏔',title:'Use the debt avalanche method',body:`With ${fmt(ccD)} in CC debt across ${S.creditCards.length} cards, pay minimums on all then throw every extra dollar at the highest-interest card.`,action:`Start with ${highCC[0]?.name||'your highest card'}, roll that payment to the next when done.`,save:'Saves the most in interest vs. spreading payments equally.'},
    sav>0?{color:'#7c3aed',icon:'💰',title:"You're saving — use it strategically",body:`On track to save ${fmt(sav)} this month with ${fmt(loanD+ccD)} in total debt.`,action:`Split: 50% toward highest-interest debt, 30% emergency fund, 20% to Maui's future.`,save:`${fmt(Math.round(sav*0.5))}/month extra could clear your personal loan in under a year.`}:null,
    {color:'#ba7517',icon:'📅',title:'Payment calendar tip',body:`You have ${S.loans.filter(l=>!l.autopay).length} loans and ${noAuto.length} CCs on manual payment — a lot of dates to track.`,action:'Set phone reminders 5 days before each manual due date.',save:'Never miss = no fees + better credit.'}
  ].filter(Boolean);
  return`${sectionHeader('Savings advice','Personalized tips based on your numbers',null,null)}
  <div class="grid grid-cols-3 gap-3 mb-5">
    ${metricCard('Total debt',`<span class="text-red-500">${fmt(ccD+loanD)}</span>`,'CCs + loans','border-red-400')}
    ${metricCard('Monthly savings',`<span class="${sav>=0?'text-emerald-500':'text-red-500'}">${fmtS(sav)}</span>`,'income minus expenses',sav>=0?'border-emerald-400':'border-red-400')}
    ${metricCard('Cash buffer',fmt(bal),Math.round(bal/((exp/26)*31))+' months of expenses','border-blue-400')}
  </div>
  ${tips.map(t=>`<div class="rounded-xl border p-5 mb-3 border-l-4" style="background:var(--surface);border-color:var(--border);border-left-color:${t.color}">
    <div class="flex items-center gap-2.5 mb-2"><span class="text-xl">${t.icon}</span><h3 class="text-sm font-semibold">${t.title}</h3></div>
    <p class="text-sm leading-relaxed" style="color:var(--text2)">${t.body}</p>
    ${t.action?`<p class="text-sm font-medium mt-2">→ ${t.action}</p>`:''}
    ${t.save?`<p class="text-xs font-semibold mt-2" style="color:${t.color}">💡 ${t.save}</p>`:''}
  </div>`).join('')}`;
}

function addTxn(){
  const desc=$('t-desc')?.value.trim(),rawAmt=parseFloat($('t-amt')?.value);
  if(!desc||isNaN(rawAmt)){alert('Fill in description and amount.');return;}
  const amt=txnType==='expense'?-Math.abs(rawAmt):Math.abs(rawAmt);
  const catId=parseInt($('t-cat')?.value)||null,acctId=parseInt($('t-acct')?.value)||S.accounts[0].id;
  S.transactions.push({id:uid(),date:$('t-date')?.value,desc,catId,amt,acct:acctId,status:$('t-status')?.value||'pending',autopay:$('t-autopay')?.checked||false,recurring:$('t-recurring')?.checked||false,recurringMonths:null});
  const a=S.accounts.find(x=>x.id===acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
  render();
}

function delTxn(id){
  const t=S.transactions.find(x=>x.id===id);
  if(t){const a=S.accounts.find(x=>x.id===t.acct);if(a)a.balance=Math.round((a.balance-t.amt)*100)/100;}
  S.transactions=S.transactions.filter(x=>x.id!==id);render();
}
function deleteBill(id){if(!confirm('Delete bill?'))return;S.bills=S.bills.filter(b=>b.id!==id);render();}
function deleteCat(id){if(!confirm('Delete envelope?'))return;S.categories=S.categories.filter(c=>c.id!==id);render();}
function deleteLoan(id){if(!confirm('Delete loan?'))return;S.loans=S.loans.filter(l=>l.id!==id);render();}
function applyPaycheck(){
  const amt=parseFloat($('pc-amt')?.value)||0,acctId=parseInt($('pc-acct')?.value),date=$('pc-date')?.value;
  S.categories.forEach(c=>{const v=parseFloat($('alloc-'+c.id)?.value)||0;c.allocated=Math.round(v*100)/100;});
  const a=S.accounts.find(x=>x.id===acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
  S.transactions.push({id:uid(),date,desc:'Paycheck',catId:null,amt,acct:acctId,status:'cleared',autopay:false,recurring:true});
  nav('dashboard');
}
function updateAllocTotal(){
  let total=0;S.categories.forEach(c=>{total+=parseFloat($('alloc-'+c.id)?.value)||0;});
  const el=$('alloc-total');if(el)el.textContent=fmt(total);
  const amt=parseFloat($('pc-amt')?.value)||0,st=$('alloc-status');
  if(st&&amt>0){const rem=amt-total;st.textContent=rem>=0?`${fmt(rem)} unallocated`:`Over by ${fmt(Math.abs(rem))}`;st.style.color=rem<0?'#ef4444':'#10b981';}
}
function clearAllData(){if(!confirm('Reset ALL data?'))return;localStorage.removeItem(SAVE_KEY+'_'+CURRENT_PROFILE);location.reload();}

    </div>
    ${mF(mD('Delete','delTxn('+id+');closeModal()'))}${mP('Save','saveTxn('+id+')')}`);
  window._editTxnType=isIncome?'income':'expense';
}

function saveTxn(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  const rawAmt=parseFloat($('et-amt')?.value)||0;
  const oldAmt=t.amt;
  t.desc=$('et-desc')?.value.trim()||t.desc;
  t.amt=window._editTxnType==='expense'?-Math.abs(rawAmt):Math.abs(rawAmt);
  t.date=$('et-date')?.value||t.date;
  t.catId=parseInt($('et-cat')?.value)||null;
  const newAcctId=parseInt($('et-acct')?.value)||t.acct;
  if(newAcctId!==t.acct){
    const oldA=S.accounts.find(x=>x.id===t.acct);if(oldA)oldA.balance=Math.round((oldA.balance-oldAmt)*100)/100;
    const newA=S.accounts.find(x=>x.id===newAcctId);if(newA)newA.balance=Math.round((newA.balance+t.amt)*100)/100;
    t.acct=newAcctId;
  } else {
    const a=S.accounts.find(x=>x.id===t.acct);if(a)a.balance=Math.round((a.balance-oldAmt+t.amt)*100)/100;
  }
  t.status=$('et-status')?.value||t.status;
  t.autopay=$('et-autopay')?.checked||false;
  t.recurring=$('et-recurring')?.checked||false;
  closeModal();render();
}

function applyReconcile(id){const a=S.accounts.find(x=>x.id===id);if(!a)return;const nb=parseFloat($('r-bal')?.value);if(!isNaN(nb))a.balance=nb;closeModal();render();}

function addBill(){S.bills.push({id:uid(),name:$('b-name')?.value.trim()||'Bill',amount:parseFloat($('b-amt')?.value)||0,due:parseInt($('b-due')?.value)||1,catId:parseInt($('b-cat')?.value)||null,autopay:$('b-auto')?.checked||false,color:_col});closeModal();render();}
function openAddCC(){_col=PALETTE[0];modal(`${mT('Add credit card')}<div class="space-y-3 mb-4">${iField('Card name','cc-name','text','e.g. Chase Freedom','')}<div class="grid grid-cols-2 gap-3">${iField('Balance','cc-bal','number','0','')}${iField('Limit','cc-lim','number','5000','')}</div><div class="grid grid-cols-2 gap-3">${iField('Due date (day)','cc-due','number','15','')}${iField('Min payment','cc-min','number','25','')}</div><div class="grid grid-cols-2 gap-3">${iField('Total payments (BNPL)','cc-total','number','0','')}${iField('Payments made','cc-made','number','0','')}</div><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="cc-auto" class="w-4 h-4 accent-blue-500"> Autopay</label></div>${colorPick(_col)}${mF()}${mP('Add card','addCC()')}`)}

function openEditCC(id){const c=S.creditCards.find(x=>x.id===id);if(!c)return;_col=c.color;modal(`${mT('Edit — '+c.name)}<div class="space-y-3 mb-4">${iField('Name','e-name','text','',c.name)}<div class="grid grid-cols-2 gap-3">${iField('Balance','e-bal','number','',c.balance)}${iField('Limit','e-lim','number','',c.limit)}</div><div class="grid grid-cols-2 gap-3">${iField('Due date','e-due','number','',c.due)}${iField('Min payment','e-min','number','',c.minPayment)}</div><div class="grid grid-cols-2 gap-3">${iField('Total payments (BNPL)','e-total','number','',c.totalPayments||0)}${iField('Payments made','e-made','number','',c.paymentsMade||0)}</div><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="e-auto" ${c.autopay?'checked':''} class="w-4 h-4 accent-blue-500"> Autopay</label></div>${colorPick(c.color)}${mF(mD('Delete','deleteCC('+id+')'))}${mP('Save','saveCC('+id+')')}`)}
function saveCC(id){const c=S.creditCards.find(x=>x.id===id);if(!c)return;c.name=$('e-name')?.value.trim()||c.name;c.balance=parseFloat($('e-bal')?.value)||0;c.limit=parseFloat($('e-lim')?.value)||c.limit;c.due=parseInt($('e-due')?.value)||c.due;c.minPayment=parseFloat($('e-min')?.value)||c.minPayment;c.autopay=$('e-auto')?.checked||false;c.color=_col;c.totalPayments=parseInt($('e-total')?.value)||0;c.paymentsMade=parseInt($('e-made')?.value)||0;const isLast=c.totalPayments>0&&c.paymentsMade>=c.totalPayments-1&&c.balance>0;closeModal();render();if(isLast)setTimeout(fireConfetti,300);}
function deleteCC(id){if(!confirm('Delete card?'))return;S.creditCards=S.creditCards.filter(c=>c.id!==id);closeModal();render();}
function openAddLoan(){_col=PALETTE[0];modal(`${mT('Add loan')}<div class="space-y-3 mb-4">${iField('Name','l-name','text','e.g. Car loan','')}${iField('Lender','l-lender','text','e.g. Toyota Financial','')}<div class="grid grid-cols-2 gap-3">${iField('Balance','l-bal','number','0','')}${iField('Original amount','l-orig','number','0','')}</div><div class="grid grid-cols-2 gap-3">${iField('Monthly payment','l-pay','number','200','')}${iField('Due date (day)','l-due','number','15','')}</div><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="l-auto" class="w-4 h-4 accent-blue-500"> Autopay</label></div>${colorPick(_col)}${mF()}${mP('Add loan','addLoan()')}`)}
function addLoan(){S.loans.push({id:uid(),name:$('l-name')?.value.trim()||'Loan',lender:$('l-lender')?.value.trim()||'',balance:parseFloat($('l-bal')?.value)||0,original:parseFloat($('l-orig')?.value)||0,payment:parseFloat($('l-pay')?.value)||0,due:parseInt($('l-due')?.value)||1,autopay:$('l-auto')?.checked||false,color:_col});closeModal();render();}
function openEditLoan(id){const l=S.loans.find(x=>x.id===id);if(!l)return;modal(`${mT('Edit — '+l.name)}<div class="space-y-3 mb-4">${iField('Name','e-name','text','',l.name)}${iField('Lender','e-lender','text','',l.lender)}<div class="grid grid-cols-2 gap-3">${iField('Balance','e-bal','number','',l.balance)}${iField('Payment','e-pay','number','',l.payment)}</div><div class="grid grid-cols-2 gap-3">${iField('Due date','e-due','number','',l.due)}<div class="flex items-end pb-2"><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="e-auto" ${l.autopay?'checked':''} class="w-4 h-4 accent-blue-500"> Autopay</label></div></div></div>${mF()}${mP('Save','saveLoan('+id+')')}`)}
function saveLoan(id){const l=S.loans.find(x=>x.id===id);if(!l)return;l.name=$('e-name')?.value.trim()||l.name;l.lender=$('e-lender')?.value.trim()||l.lender;l.balance=parseFloat($('e-bal')?.value)||l.balance;l.payment=parseFloat($('e-pay')?.value)||l.payment;l.due=parseInt($('e-due')?.value)||l.due;l.autopay=$('e-auto')?.checked||false;closeModal();render();}
function openAddCat(){_col=PALETTE[Math.floor(Math.random()*PALETTE.length)];modal(`${mT('New envelope')}<div class="space-y-3 mb-4">${iField('Name','c-name','text','e.g. Travel fund','')}${iField('Monthly budget','c-bud','number','200','')}</div>${colorPick(_col)}${mF()}${mP('Add','addCat()')}`)}
function addCat(){S.categories.push({id:uid(),name:$('c-name')?.value.trim()||'Category',color:_col,allocated:parseFloat($('c-bud')?.value)||0,budget:parseFloat($('c-bud')?.value)||0});closeModal();render();}
function openEditEnv(id){const c=S.categories.find(x=>x.id===id);if(!c)return;_col=c.color;modal(`${mT('Edit — '+c.name)}<div class="space-y-3 mb-4">${iField('Name','e-name','text','',c.name)}<div class="grid grid-cols-2 gap-3">${iField('Budget','e-bud','number','',c.budget)}${iField('Allocated','e-alloc','number','',c.allocated)}</div></div>${colorPick(c.color)}${mF()}${mP('Save','saveEnv('+id+')')}`)}
function saveEnv(id){const c=S.categories.find(x=>x.id===id);if(!c)return;c.name=$('e-name')?.value.trim()||c.name;c.budget=parseFloat($('e-bud')?.value)||0;c.allocated=parseFloat($('e-alloc')?.value)||0;c.color=_col;closeModal();render();}
function openMoveMoney(fromId){modal(`${mT('Move money')}<div class="space-y-3 mb-4">${sField('From','mv-from',S.categories.map(c=>`<option value="${c.id}"${c.id===fromId?' selected':''}>${c.name} (${fmt(c.allocated)})</option>`).join(''))}${sField('To','mv-to',S.categories.filter(c=>c.id!==fromId).map(c=>`<option value="${c.id}">${c.name}</option>`).join(''))}${iField('Amount','mv-amt','number','0.00','')}</div>${mF()}${mP('Move','doMoveMoney()')}`)}
function doMoveMoney(){const fromId=parseInt($('mv-from')?.value),toId=parseInt($('mv-to')?.value),amt=parseFloat($('mv-amt')?.value)||0;const from=S.categories.find(x=>x.id===fromId),to=S.categories.find(x=>x.id===toId);if(!from||!to||amt<=0)return;from.allocated=Math.round((from.allocated-amt)*100)/100;to.allocated=Math.round((to.allocated+amt)*100)/100;closeModal();render();}

async function saveScriptUrl(){
  const url=$('setup-url')?.value.trim();if(!url)return;
  SCRIPT_URL=url;localStorage.setItem('finance_script_url',url);
  closeModal();$('setup-banner')?.classList.add('hidden');updateSidebarFooter();
  const loaded=await loadFromSheets();if(loaded)render();else await saveToSheets();
}

function openMobileMenu(){
  const otherViews=NAV_ITEMS.filter(i=>i.view&&!['dashboard','accounts','transactions','creditcards','advice'].includes(i.view));
  const div=document.createElement('div');
  div.id='mobile-menu-modal';
  div.className='fixed inset-0 bg-black/50 z-50 flex items-end';
  div.onclick=e=>{if(e.target===div)div.remove();};
  div.innerHTML=`<div class="w-full rounded-t-2xl p-5 pb-8" style="background:var(--surface)"><div class="text-sm font-semibold mb-4" style="color:var(--text2)">More sections</div>${otherViews.map(i=>`<button onclick="nav('${i.view}')" class="w-full text-left flex items-center gap-3 py-3 border-b text-sm font-medium last:border-0 hover:opacity-70" style="border-color:var(--border);color:var(--text)"><span>${i.icon}</span>${i.label}</button>`).join('')}</div>`;
  document.body.appendChild(div);
}

// ── PWA MANIFEST ──────────────────────────────────────────
function setupPWA(){
  const manifest={name:'My Finance Dashboard',short_name:'My Finance',start_url:'.',display:'standalone',background_color:DARK_MODE?'#0f0f0e':'#ffffff',theme_color:DARK_MODE?'#0f0f0e':'#ffffff',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💰</text></svg>',sizes:'any',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('link');link.rel='manifest';link.href=url;document.head.appendChild(link);
}

// ── UPDATED APPS SCRIPT (multi-profile) ───────────────────
// The apps-script.js already handles profile param — no change needed

// ── INIT ──────────────────────────────────────────────────
const fns=[nav,cycleStatus,addTxn,delTxn,deleteBill,deleteCat,deleteLoan,applyPaycheck,updateAllocTotal,
  clearAllData,closeModal,pickCol,openEditAcct,saveAcct,openAddAcct,addAcct,openReconcile,toggleCleared,
  applyReconcile,openAddBill,addBill,openAddCC,addCC,openEditCC,saveCC,deleteCC,openAddLoan,addLoan,
  openEditLoan,saveLoan,openAddCat,addCat,openEditEnv,saveEnv,openMoveMoney,doMoveMoney,openSetup,
  saveScriptUrl,openProfileSwitch,switchProfile,forcSync,openMobileMenu,fireConfetti,exportToExcel,
  exportToCSV,selectAllTxns,toggleSelectTxn,bulkSetStatus,bulkDelete,applyFilter,clearFilters,
  setTxnType,openEditTxn,saveTxn,toggleDark];
fns.forEach(f=>window[f.name]=f);

function init(){
  try{
    applyDark();
    buildSidebarNav();
    loadLocal();
    updateProfileLabel();
    updateSidebarFooter();
    try{setupPWA();}catch(e){console.warn('PWA setup failed',e);}
    if(!SCRIPT_URL){
      const banner=document.getElementById('setup-banner');
      if(banner)banner.classList.remove('hidden');
    }
    // Always render dashboard immediately, then try sheets
    nav('dashboard');
    if(SCRIPT_URL){
      loadFromSheets().then(loaded=>{if(loaded)render();}).catch(e=>console.warn('Sheets load failed',e));
    }
  }catch(e){
    console.error('Init error:',e);
    // Force dashboard render even if init partially fails
    try{nav('dashboard');}catch(e2){
      const m=document.getElementById('main');
      if(m)m.innerHTML='<p style="padding:1rem;color:red;">Init error: '+e.message+'</p>';
    }
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}
</script>
