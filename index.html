<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="My Finance">
<meta name="theme-color" content="#ffffff" id="theme-color-meta">
<title>My Finance ✦</title>
<!-- fixed v3: moved brain-friendly helpers back inside script -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>
:root{
  --bg:#f7f6f3;--sf:#fff;--s2:#f0eee9;--bd:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);
  --tx:#1a1916;--t2:#4a4845;--t3:#7a7870;
  --fbase:15px;--fsmall:13px;--fxs:12px;--fxxs:11px;
}
body{font-family:'Inter',sans-serif;background:radial-gradient(circle at top,#ffffff 0,var(--bg) 42%);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:var(--fbase);transition:background .25s,color .25s;}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
.mono{font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.bar{transition:width .5s cubic-bezier(.4,0,.2,1);}
.ch{transition:transform .15s;}
.ch:hover{transform:translateY(-2px);}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ma{animation:fu .18s ease;}
.sc{background:#f0fdf6;color:#065f46;}
.sp{background:#fffbeb;color:#92400e;}
.si{background:#eff6ff;color:#1e40af;}
.sw{transition:transform .12s;}
.sw:hover{transform:scale(1.15);}
@keyframes cf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.cp{position:fixed;top:-20px;animation:cf linear forwards;z-index:9999;pointer-events:none;}
.sidebar{width:232px;flex-shrink:0;background:color-mix(in srgb,var(--sf) 94%, transparent);border-right:1px solid var(--bd);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:40;overflow-y:auto;transition:transform .25s;backdrop-filter:blur(16px);box-shadow:0 10px 35px rgba(0,0,0,.05);}
.s-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:39;}
.main{margin-left:232px;flex:1;padding:2.2rem 2.8rem;max-width:1600px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:var(--fsmall);font-weight:500;color:var(--t2);cursor:pointer;border-left:2px solid transparent;transition:all .13s;user-select:none;}
.ni:hover{color:var(--tx);background:var(--s2);}
.ni.active{color:var(--tx);background:var(--s2);border-left-color:var(--tx);}
.ns{font-size:var(--fxxs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:14px 18px 5px;}
.card{background:color-mix(in srgb,var(--sf) 96%, transparent);border:1px solid var(--bd);border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);transition:transform .18s,box-shadow .18s,border-color .18s;backdrop-filter:blur(16px);}
.ci{padding:22px 24px;}
.ct{font-size:var(--fxxs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:14px;}
.mc{background:linear-gradient(180deg,color-mix(in srgb,var(--sf) 98%, transparent),color-mix(in srgb,var(--sf) 93%, transparent));border:1px solid var(--bd);border-radius:18px;padding:18px 20px;box-shadow:0 10px 24px rgba(0,0,0,.04);border-left:3px solid var(--ac,#ccc);cursor:pointer;transition:all .15s;}
.mc:hover{transform:translateY(-1px);}
.mc.hid{opacity:.4;filter:grayscale(.5);}
input,select,textarea{font-family:'Inter',sans-serif;font-size:var(--fsmall);background:var(--sf);color:var(--tx);border:1px solid var(--b2);border-radius:10px;padding:9px 13px;width:100%;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--t2);}
input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:#10b981;flex-shrink:0;}
.btn{font-family:'Inter',sans-serif;font-size:var(--fsmall);font-weight:500;padding:9px 18px;border-radius:12px;border:1px solid var(--b2);cursor:pointer;transition:all .15s;background:var(--sf);color:var(--tx);box-shadow:0 1px 2px rgba(0,0,0,.04);}
.btn:hover{background:var(--s2);transform:translateY(-1px);}
.bp{background:linear-gradient(180deg,var(--tx),color-mix(in srgb,var(--tx) 86%, black));color:var(--bg);border-color:var(--tx);box-shadow:0 10px 20px rgba(0,0,0,.12);}
.bp:hover{opacity:.92;}
.bs{padding:6px 13px;font-size:var(--fsmall);border-radius:8px;}
.bd-btn{color:#991b1b;border-color:#fecaca;background:#fff8f8;}
.bd-btn:hover{background:#fee2e2;}
.badge{cursor:pointer;display:inline-flex;align-items:center;font-size:var(--fxxs);font-weight:600;padding:3px 9px;border-radius:20px;}
.dr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd);}
.dr:last-child{border-bottom:none;}
.dg{background:linear-gradient(135deg,#f8fffb,#eef7ff,#fff4fd);border-radius:20px;padding:22px 26px;margin-bottom:22px;border:1px solid var(--bd);box-shadow:0 10px 28px rgba(0,0,0,.04);}
textarea{resize:vertical;min-height:60px;font-family:'Inter',sans-serif;}
.tog{width:42px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog-d{width:20px;height:20px;border-radius:50%;background:white;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
/* Drag */
.drag-item{cursor:grab;transition:opacity .15s,background .1s;}
.drag-item:active{cursor:grabbing;}
.drag-item.dragging{opacity:.4;}
.drag-over{background:var(--s2)!important;border-top:2px solid #3b82f6!important;}
/* Mobile — phone */
@media(min-width:769px){
  .card:hover{transform:translateY(-1px);box-shadow:0 14px 32px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);}
}
.page-shell{display:flex;flex-direction:column;gap:18px;}
.section-stack{display:flex;flex-direction:column;gap:16px;}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;}
.theme-choice{display:flex;gap:8px;flex-wrap:wrap;}
.theme-choice .btn{min-width:110px;justify-content:center;}
body.theme-dark{background:radial-gradient(circle at top,#1c1b19 0,#0f0f0e 42%);}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar.open~.s-ov{display:block;}
  .main{margin-left:0!important;padding:1rem!important;padding-top:64px!important;padding-bottom:5.5rem!important;}
  .mn{display:flex!important;}
  .hm{display:none!important;}
  .g4{grid-template-columns:repeat(2,1fr)!important;}
  .g3{grid-template-columns:1fr!important;}
  .g2{grid-template-columns:1fr!important;}
  .tw{overflow-x:auto;}
  /* Transaction form grids collapse */
  .txn-grid-3{grid-template-columns:1fr!important;}
  .txn-grid-4{grid-template-columns:1fr 1fr!important;}
  /* Account detail side-by-side becomes stacked */
  .acct-detail-grid{grid-template-columns:1fr!important;}
  /* Paycheck planner stacks */
  .pc-grid{grid-template-columns:1fr!important;}
  /* Header button groups wrap */
  .sh-btns{flex-wrap:wrap!important;gap:6px!important;}
  /* Cards get less padding on mobile */
  .ci{padding:16px 14px!important;}
  /* Modal fills screen on mobile */
  .mx{border-radius:16px 16px 0 0;max-height:90vh;margin-top:auto;}
  .mb{align-items:flex-end!important;padding:0!important;}
  /* Bigger tap targets for buttons */
  .btn{min-height:42px;}
  .bs{min-height:36px;}
  /* Envelope table — hide drag handle + progress on mobile */
  .env-drag-col{display:none!important;}
  .env-prog-col{display:none!important;}
  /* Filter row wraps */
  .filter-row{flex-direction:column!important;}
  .filter-row>*{width:100%!important;}
  /* Sync badge repositioned so it doesn't overlap topbar */
  .mn{left:10px;right:10px;bottom:10px;border-radius:22px;}
  .mnb span{font-size:10px;}
  .topbar{padding:0 12px;}
  .card{border-radius:20px;}
  .mc{border-radius:20px;}
  .dg{border-radius:22px;}
  .main{max-width:none;}
  #sync-st{top:auto!important;bottom:6rem;right:10px;}
}
/* Tablet / iPad */
@media(max-width:1024px)and(min-width:769px){
  .g4{grid-template-columns:repeat(2,1fr)!important;}
  .g3{grid-template-columns:repeat(2,1fr)!important;}
  .txn-grid-3{grid-template-columns:1fr 1fr!important;}
  .txn-grid-4{grid-template-columns:1fr 1fr!important;}
  .acct-detail-grid{grid-template-columns:1fr!important;}
  .pc-grid{grid-template-columns:1fr!important;}
  .main{padding:1.5rem 1.8rem!important;}
}
/* Undo bar */
#undo-bar{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1916;color:#f5f4f0;padding:10px 18px;border-radius:30px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:400;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;}
#undo-bar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
#undo-bar button{background:rgba(255,255,255,.15);border:none;color:#f5f4f0;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
#undo-bar button:hover{background:rgba(255,255,255,.25);}
@media(max-width:768px){#undo-bar{bottom:6.5rem;width:calc(100% - 2rem);justify-content:space-between;}}
.mn{display:none;position:fixed;bottom:0;left:0;right:0;background:color-mix(in srgb,var(--sf) 92%, transparent);border-top:1px solid var(--bd);z-index:50;padding:8px 10px calc(8px + env(safe-area-inset-bottom,8px));backdrop-filter:blur(18px);box-shadow:0 -8px 30px rgba(0,0,0,.08);}
.mnb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 8px;border-radius:16px;font-size:var(--fxxs);font-weight:600;color:var(--t3);border:none;background:none;cursor:pointer;flex:1;font-family:'Inter',sans-serif;transition:background .15s,color .15s,transform .15s;}
.mnb span{font-size:11px;}
.mnb.active{color:var(--tx);background:color-mix(in srgb,var(--s2) 72%, transparent);box-shadow:inset 0 0 0 1px var(--bd);}
.topbar{display:none;position:fixed;top:0;left:0;right:0;background:color-mix(in srgb,var(--sf) 88%, transparent);border-bottom:1px solid var(--bd);z-index:38;height:58px;align-items:center;padding:0 16px;backdrop-filter:blur(18px);box-shadow:0 4px 18px rgba(0,0,0,.04);}
.pos{color:#10b981;}.neg{color:#ef4444;}.warn{color:#f59e0b;}
.fl{display:block;font-size:var(--fxxs);font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);margin-bottom:6px;}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.mx{background:color-mix(in srgb,var(--sf) 96%, transparent);border-radius:22px;padding:26px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 18px 50px rgba(0,0,0,.18);animation:fu .18s ease;backdrop-filter:blur(18px);}
/* Inline edit */
.ie-cell{cursor:pointer;padding:2px 4px;border-radius:4px;}
.ie-cell:hover{background:var(--s2);}
/* Autocomplete */
.ac-drop{position:absolute;background:var(--sf);border:1px solid var(--b2);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:300;max-height:180px;overflow-y:auto;width:100%;}
.ac-item{padding:9px 13px;cursor:pointer;font-size:var(--fsmall);}
.ac-item:hover{background:var(--s2);}
/* Global calculator */
#g-calc{position:fixed;z-index:500;background:var(--sf);border:1px solid var(--b2);border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,.18);width:260px;overflow:hidden;display:none;animation:fu .15s ease;}
#g-calc-screen{padding:12px 14px 10px;background:var(--s2);border-bottom:1px solid var(--bd);}
#g-calc-expr{font-size:11px;color:var(--t3);min-height:15px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#g-calc-val{font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.5px;color:var(--tx);line-height:1.1;}
#g-calc-total{font-size:12px;color:#10b981;font-variant-numeric:tabular-nums;margin-top:2px;min-height:16px;}
.gc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);}
.gc-btn{padding:14px 0;font-size:18px;font-weight:500;border:none;cursor:pointer;background:var(--sf);color:var(--tx);font-family:'Inter',sans-serif;transition:background .1s;-webkit-tap-highlight-color:transparent;user-select:none;}
.gc-btn:active{background:var(--s2);}
.gc-btn.op{background:var(--s2);color:#1e40af;font-size:20px;}
.gc-btn.del{background:#fff7ed;color:#92400e;}
.gc-btn.eq{background:var(--tx);color:var(--bg);font-size:20px;}
.gc-btn.add-run{background:#f0fdf6;color:#065f46;font-size:13px;font-weight:600;}

.spot-res{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .12s;}
.spot-res:hover{background:var(--s2);}
.spot-kbd{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:24px;padding:0 8px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);font-size:12px;color:var(--t3);font-weight:600;}
.alert-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:600;}


.alert-chip{padding:8px 12px;border-radius:999px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
.chart-card{background:linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,.35));}
.insight-pill{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:999px;background:var(--s2);font-size:12px;font-weight:600;color:var(--t2);}
.chart-legend{display:flex;align-items:center;gap:8px;min-width:0;}
.chart-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.report-stat{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.report-stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);font-weight:700;margin-bottom:8px;}
.report-stat .value{font-size:24px;font-weight:700;letter-spacing:-.04em;}
.report-stat .sub{font-size:12px;color:var(--t3);margin-top:4px;}

</style>
</head>
<body>
<div style="display:flex;min-height:100vh">
  <aside class="sidebar" id="sidebar">
    <div style="padding:20px 18px 15px;border-bottom:1px solid var(--bd)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div id="app-name" style="font-size:17px;font-weight:600;letter-spacing:-.3px">my finance ✦</div>
          <div id="profile-label" style="font-size:12px;color:var(--t3);margin-top:3px">Loading...</div>
        </div>
        <button onclick="toggleDark()" id="dark-btn" style="font-size:18px;padding:5px;background:none;border:none;cursor:pointer;border-radius:8px">🌙</button>
      </div>
    </div>
    <div id="snav" style="flex:1;overflow-y:auto;padding:8px 0"></div>
    <div id="sfooter" style="padding:14px 18px;border-top:1px solid var(--bd);font-size:12px;color:var(--t3);line-height:1.7"></div>
  </aside>
  <div class="s-ov" id="sov" onclick="closeSidebar()"></div>
  <div class="topbar" id="topbar">
    <button onclick="openSidebar()" style="font-size:22px;background:none;border:none;cursor:pointer;color:var(--tx)">☰</button>
    <span id="app-name-mob" style="flex:1;text-align:center;font-size:16px;font-weight:600">my finance ✦</span>
    <button onclick="toggleDark()" style="font-size:19px;background:none;border:none;cursor:pointer">🌙</button>
  </div>
  <nav class="mn" id="botnav">
    <button class="mnb" data-mv="dashboard" onclick="nav('dashboard')">📊<span>Home</span></button>
    <button class="mnb" data-mv="accounts" onclick="nav('accounts')">🏦<span>Accounts</span></button>
    <button class="mnb" data-mv="transactions" onclick="nav('transactions')">↕<span>Txns</span></button>
    <button class="mnb" data-mv="creditcards" onclick="nav('creditcards')">💳<span>Cards</span></button>
    <button class="mnb" data-mv="subscriptions" onclick="nav('subscriptions')">📱<span>Subs</span></button>
    <button class="mnb" onclick="openMoreMenu()">☰<span>More</span></button>

  <main id="main" class="main"></main>
</div>
<div id="modals"></div>
<div id="cconf"></div>

  <span id="undo-msg">↩ Action undone</span>
  <div style="display:flex;gap:8px">
    <button onclick="doUndo()">↩ Undo</button>
    <button onclick="hideUndo()">✕</button>
  </div>
</div>
<div id="setup-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:#f59e0b;color:white;text-align:center;padding:11px 18px;font-size:15px;font-weight:500;z-index:100">
  ⚙️ Setup needed — <button onclick="openSetup()" style="background:none;border:none;color:white;font-weight:700;cursor:pointer;text-decoration:underline">Connect Google Sheets</button>
  <button onclick="this.parentElement.style.display='none'" style="background:none;border:none;color:white;cursor:pointer;margin-left:14px;font-size:18px">×</button>
</div>
<div id="sync-st" style="display:none;position:fixed;top:14px;right:14px;font-size:13px;font-weight:500;padding:7px 14px;border-radius:20px;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.1)"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const PAL=['#E74C3C','#E67E22','#F1C40F','#2ECC71','#1ABC9C','#3498DB','#9B59B6','#E91E63','#FF5722','#00BCD4','#8BC34A','#FF9800','#795548','#607D8B','#F06292','#26C6DA','#AB47BC','#EC407A'];
const SK='mf_v8';
let SCRIPT_URL=localStorage.getItem('mf_url')||'';
let CUR_PROFILE=localStorage.getItem('mf_profile')||'mine';
let _storedDark=localStorage.getItem('mf_dark');
let THEME_MODE=localStorage.getItem('mf_theme_mode')||(_storedDark===null?'system':'manual');
let DARK=_storedDark===null?window.matchMedia('(prefers-color-scheme: dark)').matches:_storedDark==='true';
let HIDDEN_M=JSON.parse(localStorage.getItem('mf_hm')||'[]');
let PNAMES=JSON.parse(localStorage.getItem('mf_pnames')||'{"mine":"Joanne","edwin":"Edwin"}');
let APP_CFG=JSON.parse(localStorage.getItem('mf_cfg')||'{"name":"my finance","emoji":"✦","currency":"$"}');
let PROFILE_PIN=localStorage.getItem('mf_pin')||''; // PIN to protect Joanne's profile

// Merchant autocomplete — persisted globally (shared across profiles)
let MERCHANTS=JSON.parse(localStorage.getItem('mf_merchants')||'["Whole Foods","Target","Amazon","Netflix","Spotify","Hulu","Disney+","Apple","Google","Walmart","Starbucks","Dunkin","McDonald\'s","CVS","Walgreens","Gas Station","Costco","Trader Joe\'s","Aldi","Home Depot","Progressive","Verizon","T-Mobile","AT&T","Affirm","Afterpay","Klarna","PayPal","Venmo","Zelle"]');
function saveMerchants(){localStorage.setItem('mf_merchants',JSON.stringify(MERCHANTS));}
function learnMerchant(name){if(name&&name.length>1&&!MERCHANTS.includes(name)){MERCHANTS.push(name);if(MERCHANTS.length>500)MERCHANTS=MERCHANTS.slice(-500);saveMerchants();}}
let MERCHANT_RULES=JSON.parse(localStorage.getItem('mf_merchant_rules')||'{}');
function saveMerchantRules(){localStorage.setItem('mf_merchant_rules',JSON.stringify(MERCHANT_RULES));}
function normTxt(v){return (v||'').toLowerCase().replace(/[^a-z0-9\s&+]/g,' ').replace(/\s+/g,' ').trim();}
function saveMerchantRule(desc,catId){
  const key=normTxt(desc);
  if(!key||!catId)return;
  const parts=key.split(' ').filter(Boolean);
  const merchant=parts.slice(0,Math.min(3,parts.length)).join(' ');
  if(merchant)MERCHANT_RULES[merchant]=catId;
  saveMerchantRules();
}
function autoAssignCategory(desc){
  const key=normTxt(desc);
  if(!key)return null;
  const rules=Object.entries(MERCHANT_RULES).sort((a,b)=>b[0].length-a[0].length);
  for(const [merchant,catId] of rules){ if(key.includes(merchant)) return catId; }
  const defaults=[
    {keys:['whole foods','trader joe','aldi','costco','grocery','instacart'], match:'Groceries'},
    {keys:['starbucks','dunkin','mcdonald','doordash','uber eats','restaurant','chipotle','panera','coffee'], match:'Dining Out'},
    {keys:['netflix','spotify','hulu','disney','apple','icloud','youtube','prime','subscription'], match:'Subscriptions & Apps'},
    {keys:['shell','exxon','mobil','chevron','gas','uber','lyft','parking'], match:'Transportation & Gas'},
    {keys:['target','amazon','home depot','household'], match:'Household'},
    {keys:['cvs','walgreens','medical','doctor','pharmacy','dentist'], match:'Health-Wellness'},
    {keys:['klarna','afterpay','affirm'], match:'Monthly Essentials'},
  ];
  for(const rule of defaults){

  }

}

function subMonthlyCost(s){return Number(s.monthly || ((s.annual||0)/12) || 0);}
function subMatchesBill(s,b){
  const sDue=parseInt(s.due)||0, bDue=parseInt(b.due)||0;
  const sAmt=Math.round(subMonthlyCost(s)*100), bAmt=Math.round(Number(b.amount||0)*100);
  const sn=normTxt(s.name), bn=normTxt(b.name);
  return !!sn && sDue===bDue && sAmt===bAmt && (sn===bn || sn.includes(bn) || bn.includes(sn));
}
function subAlreadyCoveredByBill(s){return (S.bills||[]).some(b=>subMatchesBill(s,b));}
function getScheduledSubscriptions(periodFilter='', acctFilter=''){
  const today=new Date(TODAY_YEAR,TODAY_MONTH,TODAY);
  return (S.subscriptions||[]).filter(s=>{
    if(!s.due)return false;
    if(subAlreadyCoveredByBill(s))return false;
    let dueDate=new Date(TODAY_YEAR,TODAY_MONTH,parseInt(s.due)||1);
    if(dueDate<today) dueDate.setMonth(dueDate.getMonth()+1);
    const dueDateISO=toISO(dueDate);
    if(periodFilter){
      const parts=periodFilter.split('-');
      if(parts.length===2) return dueDateISO.startsWith(periodFilter);
      return dueDateISO.startsWith(parts[0]);
    }
    const cutoff=new Date(today); cutoff.setDate(cutoff.getDate()+60);
    return dueDate<=cutoff;
  }).map((s,i)=>{
    let dueDate=new Date(TODAY_YEAR,TODAY_MONTH,parseInt(s.due)||1);
    if(dueDate<today) dueDate.setMonth(dueDate.getMonth()+1);
    return {...s, subIndex:i, dueDateISO:toISO(dueDate), amount:subMonthlyCost(s)};
  }).sort((a,b)=>a.dueDateISO.localeCompare(b.dueDateISO));
}

  S.cats.forEach(cat=>{
    const budget=Number(cat.budget||cat.alloc||0);
    if(!budget)return;
    const used=spent(cat.id);
    const usedPct=(used/budget)*100;
    if(usedPct>=100) alerts.push({level:'danger',cat:cat.name,msg:`Over budget in ${cat.name}`,detail:`${fmt(used)} spent vs ${fmt(budget)} budget`,color:'#ef4444'});
    else if(usedPct>=90) alerts.push({level:'warn',cat:cat.name,msg:`Almost over budget in ${cat.name}`,detail:`${Math.round(usedPct)}% used`,color:'#f59e0b'});
    else if(usedPct>=75) alerts.push({level:'info',cat:cat.name,msg:`${cat.name} is getting close`,detail:`${Math.round(usedPct)}% of budget used`,color:'#3b82f6'});
  });
  return alerts.sort((a,b)=>({danger:0,warn:1,info:2}[a.level]-({danger:0,warn:1,info:2}[b.level])));
}

// Bill paycheck assignment
function getBillPC(billId,billDue){
  if(!S.billPCOverrides)S.billPCOverrides={};
  if(S.billPCOverrides[billId])return S.billPCOverrides[billId];
  const dates=S.paycheckDates||[];
  if(!dates.length)return null;
  const sorted=[...dates].sort();
  const today=new Date(TODAY_YEAR,TODAY_MONTH,TODAY);
  for(const d of sorted){
    const dt=new Date(d);
    if(dt>=today&&dt.getDate()<=billDue)return d;
  }
  const future=sorted.filter(d=>new Date(d)>=today);
  if(future.length)return future[0];
  return sorted[sorted.length-1];
}
function setBillPC(billId,val){
  if(!S.billPCOverrides)S.billPCOverrides={};
  if(val==='auto')delete S.billPCOverrides[billId];
  else S.billPCOverrides[billId]=val;
  sched();render();
}

function cycleStatus(id){
  const t=S.txns.find(x=>x.id===id);if(!t)return;
  const o=['pending','progress','cleared'];
  t.status=o[(o.indexOf(t.status)+1)%o.length];
  // Auto-mark matching bill as paid when transaction is cleared
  if(t.status==='cleared'&&t.amt<0){
    const matchingBill=S.bills.find(b=>
      b.name===t.desc&&Math.abs(b.amount-Math.abs(t.amt))<0.01&&!b.paidThisCycle
    );
    if(matchingBill)matchingBill.paidThisCycle=true;
  }
  render();
}

// ── UNDO ─────────────────────────────────────────────────────────────────────
let _undoStack=[];  // max 2 snapshots
let _undoTimer=null;
const UNDO_KEYS=['accounts','creditCards','loans','bnpl','cats','bills','subscriptions','txns','nextId','catOrder','paycheckDates','paycheckSplits','paychecks','forecastMonths','forecastStartOffset','billPCOverrides','envGroups'];

function snapshot(label){
  const copy=JSON.parse(JSON.stringify(Object.fromEntries(UNDO_KEYS.map(k=>[k,S[k]]))));
  _undoStack.push({data:copy,label:label||'Last action'});
  if(_undoStack.length>2)_undoStack.shift(); // keep max 2
  showUndo(label||'Action saved');
}

function showUndo(label){
  const bar=$('undo-bar'),msg=$('undo-msg');
  if(!bar)return;
  if(msg)msg.textContent=`↩ Undo: ${label} (${_undoStack.length} step${_undoStack.length>1?'s':''} available)`;
  bar.classList.add('show');
  if(_undoTimer)clearTimeout(_undoTimer);
  _undoTimer=setTimeout(hideUndo,8000);
}

function hideUndo(){
  const bar=$('undo-bar');if(bar)bar.classList.remove('show');
  if(_undoTimer)clearTimeout(_undoTimer);
}

function doUndo(){
  if(!_undoStack.length){hideUndo();return;}
  const snap=_undoStack.pop();
  UNDO_KEYS.forEach(k=>{if(snap.data[k]!==undefined)S[k]=snap.data[k];});
  saveLocal();
  if(_undoStack.length){
    const msg=$('undo-msg');
    if(msg)msg.textContent=`↩ Undo: ${_undoStack[_undoStack.length-1].label} (1 step remaining)`;
  } else {
    hideUndo();
  }
  render();
}

function getSpotlightResults(q){
  const key=normTxt(q);
  if(!key)return [];
  const items=[];
  ALLNAV.forEach(n=>{
    if(normTxt(n.label).includes(key))items.push({type:'Section',title:n.label,meta:n.sec,action:`nav('${n.id}')`});
  });
  S.txns.forEach(t=>{
    const c=catBy(t.catId),a=acctBy(t.acct);
    const hay=normTxt([t.desc,t.note,c?c.name:'',a?a.name:''].join(' '));
    if(hay.includes(key))items.push({type:'Transaction',title:t.desc,meta:`${t.date} · ${c?c.name:'Income'} · ${fmt(t.amt)}`,action:`openEditTxn(${t.id})`});
  });
  S.bills.forEach(b=>{
    if(normTxt(b.name).includes(key))items.push({type:'Bill',title:b.name,meta:`${fmt(b.amount)} · due ${ord(b.due)}`,action:`nav('bills')`});
  });
  (S.subscriptions||[]).forEach((s,i)=>{
    if(normTxt([s.name,s.category].join(' ')).includes(key))items.push({type:'Subscription',title:s.name,meta:`${fmt(s.monthly||s.annual/12||0)}/mo`,action:`openEditSub(${i})`});

  (S.bnpl||[]).forEach(b=>{

function filteredTxns(){
  const f=S.txnF||{};
  let t=[...S.txns];
  if(f.search)t=t.filter(x=>x.desc.toLowerCase().includes(f.search.toLowerCase())||(x.note||'').toLowerCase().includes(f.search.toLowerCase()));
  if(f.status)t=t.filter(x=>x.status===f.status);
  if(f.type==='income')t=t.filter(x=>x.amt>0);
  if(f.type==='expense')t=t.filter(x=>x.amt<0);
  if(f.recurring==='yes')t=t.filter(x=>x.recurring);
  if(f.recurring==='no')t=t.filter(x=>!x.recurring);
  if(f.period){const[y,m]=f.period.split('-');if(m)t=t.filter(x=>x.date.startsWith(f.period));else t=t.filter(x=>x.date.startsWith(y));}
  if(f.acct)t=t.filter(x=>x.acct===parseInt(f.acct));
  if(f.tag!=null)t=t.filter(x=>(x.tags||[]).includes(f.tag));
  return t.sort((a,b)=>b.date.localeCompare(a.date));
}

    try{
      let rows=[];
      if(isCSV){
        const lines=e.target.result.split('\n').filter(l=>l.trim());
        const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
        rows=lines.slice(1).map(line=>{
          const vals=line.match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g)||[];
          const o={};hdrs.forEach((h,i)=>o[h]=(vals[i]||'').replace(/"/g,'').trim());return o;
        });
      }else{
        const data=new Uint8Array(e.target.result);const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{raw:false}).map(r=>{const o={};Object.keys(r).forEach(k=>o[k.toLowerCase()]=r[k]);return o;});
      }
      // Support YNAB format (Payee, Outflow, Inflow, Cleared)
      const isYNAB=rows[0]&&('payee' in rows[0]||'outflow' in rows[0]);
      _impRows=rows.filter(r=>r.description||r.desc||r.payee).map(r=>{
        let amt;
        if(isYNAB){
          const out=parseFloat((r.outflow||'0').replace(/[$,]/g,''))||0;
          const inf=parseFloat((r.inflow||'0').replace(/[$,]/g,''))||0;
          amt=inf>0?inf:-out;
        }else{amt=parseFloat(r.amount||r.amt||0);}
        const desc=(r.description||r.desc||r.payee||'').trim();
        return{id:uid(),date:r.date||TODAY_ISO,desc,amt,catId:null,acct:S.accounts[0]?.id||1,status:(r.cleared||r.status||'pending').toLowerCase()==='cleared'?'cleared':'pending',autopay:false,recurring:false,note:r.memo||r.note||r.notes||''};
      }).filter(r=>r.desc&&!isNaN(r.amt)&&r.amt!==0);
      // Learn merchants from import
      _impRows.forEach(r=>learnMerchant(r.desc));
      const prev=$('imp-prev');
      if(prev)prev.innerHTML=`<div style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px">PREVIEW (${_impRows.length} rows)</div>`+_impRows.slice(0,4).map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:14px"><span>${r.desc}</span><span class="mono" style="color:${r.amt>0?'#10b981':'#ef4444'}">${r.amt>0?'+':''}${fmt(r.amt)}</span></div>`).join('');
    }catch(e){const err=$('imp-err');if(err){err.textContent='Could not read: '+e.message;err.style.display='block';}_impRows=[];}
  };
  if(isCSV)reader.readAsText(file);else reader.readAsArrayBuffer(file);
}
function doImport(){if(!_impRows.length){alert('Select a file first');return;}S.txns.push(..._impRows);_impRows=[];closeModal();render();}

// ── PAYCHECK CALC ─────────────────────────────────────────────────────────────
function calcPC(){
  const total=parseFloat($('pc-total')?.value)||0;
  let alloc=0;
  (S.paycheckSplits||[]).forEach(sp=>{
    const amt=sp.type==='amount'?sp.value:Math.round(sp.value/100*total*100)/100;
    alloc+=amt;
    const el=$('sp-prev-'+sp.acctId);if(el)el.textContent=fmt(amt);
  });
  const rem=Math.round((total-alloc)*100)/100;
  const el=$('pc-rem');
  if(el){el.textContent=fmt(Math.abs(rem));el.style.color=rem<0?'#ef4444':rem===0?'#10b981':'var(--t2)';}
}
function calcAlloc(){
  let total=0;S.cats.forEach(c=>{total+=parseFloat($('alloc-'+c.id)?.value)||0;});
  const el=$('alloc-total');if(el)el.textContent=fmt(total);
  const amt=parseFloat($('pc-total')?.value)||0,st=$('alloc-status');
  if(st&&amt>0){const rem=amt-total;st.textContent=rem>=0?'✅ '+fmt(rem)+' unallocated':'⚠️ Over by '+fmt(Math.abs(rem));st.style.color=rem<0?'#ef4444':'#10b981';}
}
function updSplitType(aid,type){const sp=(S.paycheckSplits||[]).find(s=>s.acctId===aid);if(sp)sp.type=type;calcPC();}
function updSplitVal(aid,val){const sp=(S.paycheckSplits||[]).find(s=>s.acctId===aid);if(sp)sp.value=parseFloat(val)||0;calcPC();}

// ── ENVELOPE DRAG ─────────────────────────────────────────────────────────────
let _dragCatId=null;

function bindEnvDrag(){
  document.querySelectorAll('.env-row[data-cid]').forEach(row=>{
    row.addEventListener('dragstart',e=>{
      _dragCatId=parseInt(row.dataset.cid);
      row.classList.add('dragging');
      try{e.dataTransfer.effectAllowed='move';}catch(err){}
    });
    row.addEventListener('dragend',e=>{
      row.classList.remove('dragging');
      document.querySelectorAll('.env-row').forEach(r=>r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      document.querySelectorAll('.env-row').forEach(r=>r.classList.remove('drag-over'));
      if(parseInt(row.dataset.cid)!==_dragCatId)row.classList.add('drag-over');
    });
    row.addEventListener('drop',e=>{
      e.preventDefault();
      row.classList.remove('drag-over');
      const targetId=parseInt(row.dataset.cid);
      if(!_dragCatId||_dragCatId===targetId)return;
      const dragged=S.cats.find(c=>c.id===_dragCatId);
      const target=S.cats.find(c=>c.id===targetId);
      if(!dragged||!target)return;
      if((dragged.group||'')!==(target.group||'')) dragged.group=target.group;
      const order=S.catOrder||S.cats.map(c=>c.id);
      const fi=order.indexOf(_dragCatId),ti=order.indexOf(targetId);
      if(fi>=0&&ti>=0) order.splice(ti,0,order.splice(fi,1)[0]);
      S.catOrder=[...order];
      _dragCatId=null;
      sched();render();
    });
  });
}

function vEnvs(){
  if(!S.savingsGoals)S.savingsGoals=[];

  if(!S.collapsedGroups)S.collapsedGroups={};

  const ts=S.cats.reduce((s,c)=>s+c.alloc,0);
  const sp=totExp();
  const rem=ts-sp;

  const catData=S.cats.map(c=>{
    const group=(c.group&&c.group!=='Other')?c.group:'General';
    const spAmt=spent(c.id);
    const remAmt=c.alloc-spAmt;
    const over=spAmt>c.alloc&&c.alloc>0;
    const underfunded=c.alloc<c.budget&&c.budget>0;
    const overfunded=c.alloc>c.budget&&c.budget>0;

  let filtered=catData;
  if(S.envTab==='overspent') filtered=catData.filter(c=>c.over);
  if(S.envTab==='underfunded') filtered=catData.filter(c=>c.underfunded);

// ── SCHEDULED BILLS HELPERS ───────────────────────────────────────────────────
// Returns bills that are upcoming and not yet paid this cycle
// Filtered to match the current period filter if set, otherwise next 60 days
function getScheduledBills(periodFilter, acctFilter){
  const today = new Date(TODAY_ISO);
  return S.bills.filter(b=>{
    if(b.paidThisCycle) return false; // already paid
    // Build the due date for this month
    const dueDate = new Date(TODAY_YEAR, TODAY_MONTH, b.due);
    // If due day already passed this month, it's next month
    if(dueDate < today) dueDate.setMonth(dueDate.getMonth()+1);
    const dueDateISO = dueDate.toISOString().slice(0,10);
    // Filter by account if set
    if(acctFilter && b.acctId && b.acctId !== parseInt(acctFilter)) return false;
    // Filter by period
    if(periodFilter){
      const[y,m]=periodFilter.split('-');
      if(m) return dueDateISO.startsWith(periodFilter);
      else return dueDateISO.startsWith(y);
    }
    // Default: next 60 days
    const cutoff = new Date(today); cutoff.setDate(cutoff.getDate()+60);
    return dueDate <= cutoff;
  }).map(b=>{
    const dueDate = new Date(TODAY_YEAR, TODAY_MONTH, b.due);
    if(dueDate < today) dueDate.setMonth(dueDate.getMonth()+1);
    return {...b, dueDateISO: dueDate.toISOString().slice(0,10)};
  }).sort((a,b)=>a.dueDateISO.localeCompare(b.dueDateISO));
}

// Renders the collapsible scheduled transactions section
let _schedSort={col:'date',dir:1};

function sortSched(col){
  if(_schedSort.col===col)_schedSort.dir*=-1;
  else _schedSort={col,dir:1};
  // Re-sort and re-render the sched rows without full render
  const tbody=document.getElementById('sched-rows');
  if(!tbody)return;
  // Trigger full render to rebuild with new sort
  render();
  // Re-open after render
  _schedOpen=true;
  const rows=document.getElementById('sched-rows');
  const chevron=document.getElementById('sched-chevron');
  if(rows)rows.style.display='';
  if(chevron)chevron.textContent='▼';
}


function scheduledBillsHTML(bills, subs, showBalance, startBal){
  if(!bills.length && !subs.length) return '';

  const items=[
    ...bills.map(b=>({kind:'bill',sortDate:b.dueDateISO,name:b.name,amount:b.amount,raw:b})),
    ...subs.map(s=>({kind:'sub',sortDate:s.dueDateISO,name:s.name,amount:s.amount,raw:s}))
  ];

  const {col,dir}=_schedSort;
  items.sort((a,b)=>{
    if(col==='date') return dir*a.sortDate.localeCompare(b.sortDate);
    if(col==='name') return dir*a.name.localeCompare(b.name);
    if(col==='amount') return dir*(a.amount-b.amount);
    return 0;
  });

  let projBal = startBal;
  const rows = items.map(item=>{
    projBal = Math.round((projBal - item.amount)*100)/100;
    if(item.kind==='bill'){
      const b=item.raw;
      const acct = acctBy(b.acctId);
      const cat = catBy(b.catId);
      return`<tr style="border-bottom:1px solid var(--bd);background:#fafaf8;opacity:.92">

        <td class="mono" style="padding:10px;font-size:13px;color:var(--t2);white-space:nowrap"><button type="button" onclick="openScheduledDateModal('bill',${b.id},'${b.dueDateISO}','${b.name.replace(/'/g,"\'")}')" title="Preview calendar date" style="background:none;border:none;padding:0;cursor:pointer;color:inherit;font:inherit;text-decoration:underline;text-underline-offset:3px">${b.dueDateISO}</button></td>
        <td style="padding:10px">
          <div style="font-weight:500;color:var(--t2)">${b.name}${b.autopay?' 🅐':''}</div>
          <div style="font-size:11px;color:var(--t3)">Scheduled bill</div>
          <button onclick="openEditBill(${b.id})" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--t3);padding:1px 0;text-decoration:underline">edit bill</button>
        </td>

function logSubscriptionTxn(i, logDate){
  const s=(S.subscriptions||[])[i]; if(!s) return;
  const acctId=S.accounts[0]?.id||1;
  const amount=subMonthlyCost(s);
  const effectiveDate=logDate||TODAY_ISO;
  const thisMonth=effectiveDate.slice(0,7);
  const already=S.txns.some(t=>t.desc===s.name && Math.round(Math.abs(t.amt||0)*100)===Math.round(amount*100) && (t.note||'').includes('Auto-logged from subscription') && t.date.slice(0,7)===thisMonth);
  if(already){ alert('That subscription is already logged for this month.'); return; }
  let catId=null;
  const match=S.cats.find(c=>normTxt(c.name)===normTxt(s.category||''));
  if(match) catId=match.id;
  S.txns.push({id:uid(),date:effectiveDate,desc:s.name,catId,amt:-amount,acct:acctId,status:'cleared',autopay:true,recurring:true,note:'Auto-logged from subscription'});
  const acct=S.accounts.find(a=>a.id===acctId);
  if(acct) acct.balance=Math.round((acct.balance-amount)*100)/100;
  sched();render();
}

function openCalendarPreview(dateISO,label){
  const base=new Date((dateISO||TODAY_ISO)+'T00:00:00');
  const y=base.getFullYear(), m=base.getMonth(), d=base.getDate();
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const startPad=(first.getDay()+6)%7;
  const days=[];
  for(let i=0;i<startPad;i++) days.push('');
  for(let i=1;i<=last.getDate();i++) days.push(i);
  while(days.length%7) days.push('');
  modal(`${mT('🗓 ' + (label||'Scheduled date'))}<div style="margin-bottom:12px;font-size:14px;color:var(--t2)">${base.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'})}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:12px;text-align:center;margin-bottom:8px;color:var(--t3)">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(x=>`<div>${x}</div>`).join('')}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">${days.map(day=>`<div style="height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:${day===d?'var(--tx)':'var(--s2)'};color:${day===d?'var(--bg)':day?'var(--tx)':'transparent'};font-weight:${day===d?700:500}">${day||''}</div>`).join('')}</div><div style="margin-top:14px;font-size:12px;color:var(--t3)">Tip: use edit on the bill or subscription row if you want to change its due date.</div><div style="display:flex;justify-content:flex-end;margin-top:16px"><button class="btn bp" onclick="closeModal()">Done</button></div>`);
}

function vBills(){
  if(!S.billSort)S.billSort={col:'due',dir:1};
  if(S.billFilter===undefined)S.billFilter='';
  const {col,dir}=S.billSort;
  let bills=[...S.bills];
  if(S.billFilter==='manual') bills=bills.filter(b=>!b.autopay);
  if(S.billFilter==='paid')   bills=bills.filter(b=>b.paidThisCycle);
  if(S.billFilter==='unpaid') bills=bills.filter(b=>!b.paidThisCycle);
  bills.sort((a,b)=>{
    if(col==='name')    return dir*a.name.localeCompare(b.name);
    if(col==='amount')  return dir*(a.amount-b.amount);
    if(col==='due')     return dir*(du(a.due)-du(b.due));
    if(col==='payment') return dir*((a.autopay?0:1)-(b.autopay?0:1));
    return 0;
  });
  const total=S.bills.reduce((s,b)=>s+b.amount,0),autoT=S.bills.filter(b=>b.autopay).reduce((s,b)=>s+b.amount,0);
  const paidCount=S.bills.filter(b=>b.paidThisCycle).length;
  const manualCount=S.bills.filter(b=>!b.autopay).length;
  const sTh=(label,colKey)=>{const active=col===colKey,arrow=active?(dir===1?'↑':'↓'):'↕';return`<th onclick="setBillSort('${colKey}')" style="text-align:left;padding:11px 15px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:${active?'var(--tx)':'var(--t3)'};cursor:pointer;user-select:none;white-space:nowrap">${label} <span style="opacity:.5">${arrow}</span></th>`;};

  ${(S.paycheckDates||[]).length?`<div style="background:#f0fdf6;border:1px solid #a7f3d0;border-radius:10px;padding:11px 16px;margin-bottom:16px;font-size:14px;color:#065f46">📅 Paychecks: ${S.paycheckDates.slice(0,4).join(', ')} · Bills auto-assigned to nearest paycheck</div>`:`<div style="background:var(--s2);border-radius:10px;padding:11px 16px;margin-bottom:16px;font-size:14px;color:var(--t3)">💡 <button onclick="nav('settings')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#3b82f6;text-decoration:underline">Set paycheck dates in Settings</button> to see smart bill assignment</div>`}
  <div class="g4" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px">
    <div class="mc" style="--ac:#ef4444;background:${S.billFilter===''?'var(--s2)':'var(--sf)'}" onclick="S.billFilter='';render()"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:7px">💸 Monthly total</div><div style="font-size:24px;font-weight:600;font-variant-numeric:tabular-nums"><span class="neg">${fmt(total)}</span></div><div style="font-size:13px;color:var(--t3);margin-top:4px">${S.bills.length} bills</div></div>
    <div class="mc" style="--ac:#3b82f6"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:7px">🅐 On autopay</div><div style="font-size:24px;font-weight:600;font-variant-numeric:tabular-nums">${fmt(autoT)}</div><div style="font-size:13px;color:var(--t3);margin-top:4px">${S.bills.filter(b=>b.autopay).length} bills</div></div>
    <div class="mc" style="--ac:#f59e0b;cursor:pointer;background:${S.billFilter==='manual'?'#fffbeb':'var(--sf)'};border:2px solid ${S.billFilter==='manual'?'#f59e0b':'transparent'}" onclick="S.billFilter=S.billFilter==='manual'?'':'manual';render()"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:7px">⚠️ Manual</div><div style="font-size:24px;font-weight:600;font-variant-numeric:tabular-nums"><span class="warn">${fmt(total-autoT)}</span></div><div style="font-size:13px;color:var(--t3);margin-top:4px">${manualCount} bills · tap to filter</div></div>
    <div class="mc" style="--ac:#10b981;cursor:pointer;background:${S.billFilter==='unpaid'?'#f0fdf6':'var(--sf)'};border:2px solid ${S.billFilter==='unpaid'?'#10b981':'transparent'}" onclick="S.billFilter=S.billFilter==='unpaid'?'':'unpaid';render()"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:7px">✅ Paid this cycle</div><div style="font-size:24px;font-weight:600;font-variant-numeric:tabular-nums">${paidCount}/${S.bills.length}</div><div style="font-size:13px;color:var(--t3);margin-top:4px">${paidCount===S.bills.length?'All done! 🎉':'tap to filter unpaid'}</div></div>
  </div>
  ${S.billFilter?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 14px;background:var(--s2);border-radius:10px;font-size:14px"><span>Showing: <strong>${S.billFilter}</strong> (${bills.length})</span><button onclick="S.billFilter='';render()" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:13px;font-weight:600">✕ Clear</button></div>`:''}
  <div class="card" style="overflow:hidden">
    <div class="tw">
      <table style="width:100%;border-collapse:collapse;font-size:14px">
        <thead><tr style="border-bottom:1px solid var(--bd)">
          ${[sTh('Bill','name'),sTh('Amount','amount'),sTh('Due','due'),'<th style="text-align:left;padding:11px 15px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)">Days</th>',sTh('Payment','payment'),'<th style="text-align:left;padding:11px 15px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)">Account</th>','<th style="text-align:left;padding:11px 15px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)">Paycheck</th>','<th style="text-align:left;padding:11px 15px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)">Paid?</th>','<th style="text-align:left;padding:11px 15px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)">Actions</th>'].join('')}
        </tr></thead>
        <tbody>
          ${bills.length?bills.map(b=>{
            const pc=getBillPC(b.id,b.due);
            const acct=acctBy(b.acctId);
            return`<tr style="border-bottom:1px solid var(--bd);background:${b.paidThisCycle?'#f0fdf6':''}">
              <td style="padding:11px 15px"><div style="display:flex;align-items:center;gap:9px"><div style="width:10px;height:10px;border-radius:50%;background:${b.color}"></div><span style="font-weight:500">${b.name}</span></div></td>
              <td class="mono neg" style="padding:11px 15px;font-weight:600">${fmt(b.amount)}</td>
              <td style="padding:11px 15px;color:var(--t2)">${ord(b.due)}</td>

              <td style="padding:11px 15px">${acct?`<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${acct.color};display:inline-block"></span>${acct.name}</span>`:'<span style="color:var(--t3)">Any</span>'}</td>
              <td style="padding:11px 15px">${(S.paycheckDates||[]).length?`<select onchange="setBillPC(${b.id},this.value)" style="font-size:13px;padding:5px 9px;border-radius:8px;background:var(--s2);color:var(--tx);border:1px solid var(--bd);outline:none"><option value="auto">${pc&&!((S.billPCOverrides||{})[b.id])?'Auto: '+pc:'Auto'}</option>${(S.paycheckDates||[]).map(d=>`<option value="${d}" ${(S.billPCOverrides||{})[b.id]===d?'selected':''}>${d}</option>`).join('')}</select>`:'<span style="color:var(--t3);font-size:12px">—</span>'}</td>
              <td style="padding:11px 15px">
                <button onclick="toggleBillPaid(${b.id})" style="padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;background:${b.paidThisCycle?'#d1fae5':'var(--s2)'};color:${b.paidThisCycle?'#065f46':'var(--t3)'}">${b.paidThisCycle?'✅ Paid':'Mark paid'}</button>
              </td>
              <td style="padding:11px 15px">
                <div style="display:flex;gap:5px">
                  <button class="btn bs" style="font-size:12px;padding:4px 9px" onclick="openEditBill(${b.id})">✏️ Edit</button>
                  <button onclick="delBill(${b.id})" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3)">×</button>
                </div>
              </td>
            </tr>`;
          }).join(''):`<tr><td colspan="9" style="text-align:center;padding:36px;color:var(--t3)">No bills match filter</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>`;
}

function setBillSort(col){
  if(!S.billSort)S.billSort={col:'due',dir:1};
  if(S.billSort.col===col)S.billSort.dir*=-1;
  else S.billSort={col,dir:1};
  render();
}

function openAddSub(){

    ${iF('Service / Description','as-n','text','e.g. Netflix, Spotify, Gym...','')}

    <p style="font-size:13px;color:var(--t3);margin:0">Tip: Fill in monthly cost and annual will auto-calculate, or enter both.</p>

function addSub(){
  const m=parseFloat($('as-m')?.value)||0;
  const a=parseFloat($('as-a')?.value)||(m*12);
  if(!S.subscriptions)S.subscriptions=[];
  S.subscriptions.push({name:$('as-n')?.value.trim()||'Subscription',due:$('as-d')?.value.trim()||'',category:$('as-c')?.value.trim()||'',monthly:m,annual:a});
  closeModal();render();
}

function openEditSub(i){
  const s=(S.subscriptions||[])[i];if(!s)return;
  modal(`${mT('📱 Edit — '+s.name)}
  <div style="display:grid;gap:12px;margin-bottom:16px">
    ${iF('Service / Description','es-n','text','',s.name)}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${iF('Due date (day of month)','es-d','number','1',s.due||'')}
      ${iF('Category','es-c','text','',s.category||'')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${iF('Monthly cost ($)','es-m','number','',s.monthly||'')}
      ${iF('Annual cost ($)','es-a','number','',s.annual||'')}
    </div>
  </div>
  ${mF(mD('🗑 Delete','delSub('+i+');closeModal()'))}${mP('💾 Save','saveSub('+i+')')}`);}

function saveSub(i){
  const s=(S.subscriptions||[])[i];if(!s)return;
  s.name=$('es-n')?.value.trim()||s.name;
  s.due=$('es-d')?.value.trim()||s.due;
  s.category=$('es-c')?.value.trim()||s.category;
  s.monthly=parseFloat($('es-m')?.value)||0;
  s.annual=parseFloat($('es-a')?.value)||(s.monthly*12);
  closeModal();render();
}

function delSub(i){if(!confirm('Delete subscription?'))return;S.subscriptions.splice(i,1);closeModal();render();}

// Inline edit for subscriptions
function inlineEditSub(i,field){
  const s=(S.subscriptions||[])[i];if(!s)return;
  const labels={due:'Due date (day)',name:'Description',category:'Category',annual:'Annual cost ($)',monthly:'Monthly cost ($)'};
  const type=field==='due'||field==='annual'||field==='monthly'?'number':'text';
  modal(`${mT('✏️ Edit '+labels[field])}
  <div style="margin-bottom:18px">${iF(labels[field],'ie-val',type,'',s[field]||'')}</div>
  ${mF()}${mP('Save','saveInlineSub('+i+',"'+field+'")')}`);}

function saveInlineSub(i,field){
  const s=(S.subscriptions||[])[i];if(!s)return;
  const val=$('ie-val')?.value.trim();
  if(field==='annual'||field==='monthly')s[field]=parseFloat(val)||0;
  else s[field]=val;
  // Auto-calc annual from monthly
  if(field==='monthly'&&!s.annual)s.annual=(s.monthly*12);
  closeModal();render();
}

// ── PAYCHECK PLANNER ──────────────────────────────────────────────────────────
function vPaycheck(){
  const splits=S.paycheckSplits||[];
  if(!S.paychecks)S.paychecks=[];

  // Group bills by paycheck date
  const pcDates=S.paycheckDates||[];
  const getBillsForPC=pcDate=>{
    return S.bills.filter(b=>{
      const assigned=getBillPC(b.id,b.due);
      return assigned===pcDate;
    });

  return`${sh('Paycheck Planner','⊕','Plan each paycheck — bills, savings, and expenses',null,null)}

function savePaycheckPlan(){
  const total=parseFloat($('pc-total')?.value)||0;
  if(!total){alert('Enter a paycheck amount');return;}

  sched();alert('Paycheck saved to history! ✅');render();
}

function delPaycheckPlan(id){
  S.paychecks=S.paychecks.filter(p=>p.id!==id);sched();render();
}

function resetBillsPaid(pcDate){
  if(!confirm('Reset paid status for bills on this paycheck?'))return;
  const pcBills=S.bills.filter(b=>getBillPC(b.id,b.due)===pcDate);
  pcBills.forEach(b=>b.paidThisCycle=false);
  sched();render();
}

function saveBNPLPayment(id){
  const p=(S.bnpl||[]).find(x=>x.id===id); if(!p)return;
  const amt=parseFloat($('bpay-amt')?.value)||0;
  const acctId=parseInt($('bpay-acct')?.value)||S.accounts[0]?.id;
  if(!amt){alert('Enter a payment amount');return;}
  snapshot('Log BNPL payment');
  p.remaining=Math.max(0,Math.round((p.remaining-amt)*100)/100);
  if(p.paymentsLeft)p.paymentsLeft=Math.max(0,p.paymentsLeft-1);
  if(p.firstPaymentDate){
    const base=new Date((p.firstPaymentDate||TODAY_ISO)+'T00:00:00');
    const cadence=p.cadence||'monthly';
    if(cadence==='biweekly') base.setDate(base.getDate()+14);
    else if(cadence==='weekly') base.setDate(base.getDate()+7);
    else base.setMonth(base.getMonth()+1);
    p.firstPaymentDate=base.toISOString().slice(0,10);
    p.due=base.getDate();
  }
  const acct=S.accounts.find(a=>a.id===acctId);
  if(acct)acct.balance=Math.round((acct.balance-amt)*100)/100;
  const cat=S.cats.find(c=>c.name==='Monthly Essentials') || S.cats.find(c=>c.name==='Other Bills');
  S.txns.push({id:uid(),date:$('bpay-date')?.value||TODAY_ISO,desc:`BNPL payment — ${p.provider} · ${p.name}`,catId:cat?cat.id:null,amt:-Math.abs(amt),acct:acctId,status:'cleared',autopay:p.autopay||false,recurring:false,note:$('bpay-note')?.value?.trim()||'',tags:[]});
  closeModal();render();
}

function vForecast(){
  const mo=S.forecastMonths||6;
  const startOffset=(S.forecastStartOffset??0);
  const timeline=[];
  const startingBalance=totBal();

  for(let i=0;i<mo;i++){
    const monthOffset=startOffset+i;
    const start=monthStart(monthOffset);
    const end=monthEnd(monthOffset);
    const label=start.toLocaleString('en-US',{month:'short',year:'numeric'});
    const mKey=toISO(start).slice(0,7);
    let income=0, expenses=0;

    (S.paycheckDates||[]).forEach(d=>{
      if((d||'').slice(0,7)===mKey){
        const match=(S.paychecks||[]).find(p=>p.date===d);
        income += match ? Number(match.total||0) : 0;
      }
    });

    (S.bills||[]).forEach(b=>{
      const occ=nextMonthlyOccurrence(b.due, monthOffset);
      if(occ>=start&&occ<=end) expenses += Number(b.amount||0);
    });

    (S.subscriptions||[]).forEach(s=>{
      if(!s.due || subAlreadyCoveredByBill(s)) return;
      const occ=nextMonthlyOccurrence(s.due, monthOffset);
      if(occ>=start&&occ<=end) expenses += subMonthlyCost(s);
    });

    (S.bnpl||[]).forEach(b=>{
      if(!b.remaining || !b.payment)return;
      const paymentsLeft=Math.max(1, parseInt(b.paymentsLeft)||Math.ceil((b.remaining||0)/(b.payment||1)));
      if(i<paymentsLeft){
        const occ=nextMonthlyOccurrence(b.due, monthOffset);
        if(occ>=start&&occ<=end) expenses += Math.min(Number(b.payment||0), Number(b.remaining||0));
      }
    });

    const net=income-expenses;
    timeline.push({label,income,expenses,net});
  }

  let running=startingBalance;
  const rows=timeline.map(m=>{
    running=Math.round((running+m.net)*100)/100;
    return {...m,running};
  });

  const totalIncome=rows.reduce((s,r)=>s+r.income,0);
  const totalExp=rows.reduce((s,r)=>s+r.expenses,0);
  const totalNet=totalIncome-totalExp;
  const maxVal=Math.max(...rows.map(r=>Math.max(r.income,r.expenses,Math.abs(r.net))),1);
  const dedupedSubs=(S.subscriptions||[]).filter(s=>subAlreadyCoveredByBill(s)).length;

  return`${sh('Forecast','◎',mo+'-month cash flow projection',null,null)}
  <div style="margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:14px;color:var(--t2)">Start:</span>
    ${[
      {v:0,l:'This month'},
      {v:1,l:'Next month'},
      {v:2,l:'+2 mo'}
    ].map(opt=>`<button onclick="setForecastStart(${opt.v})" class="btn bs" style="background:${startOffset===opt.v?'var(--tx)':'var(--sf)'};color:${startOffset===opt.v?'var(--bg)':'var(--t2)'}">${opt.l}</button>`).join('')}
    <span style="width:10px"></span>
    <span style="font-size:14px;color:var(--t2)">Months:</span>
    ${[3,6,12].map(n=>`<button onclick="S.forecastMonths=${n};render()" class="btn bs" style="background:${mo===n?'var(--tx)':'var(--sf)'};color:${mo===n?'var(--bg)':'var(--t2)'}">${n}mo</button>`).join('')}
    <span style="margin-left:auto;font-size:12px;color:var(--t3)">Uses saved paychecks + bills + subscriptions + BNPL plans</span>
  </div>
  ${dedupedSubs?`<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#1e40af">ℹ️ ${dedupedSubs} subscription${dedupedSubs===1?'':'s'} already exist${dedupedSubs===1?'s':''} as bill${dedupedSubs===1?'':'s'}, so they were skipped here to avoid double counting.</div>`:''}
  <div class="g3" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:22px">
    ${mCard('fc-a','Forecast income','💰',`<span class="pos">${fmt(totalIncome)}</span>`,mo+' months','#10b981')}
    ${mCard('fc-b','Forecast expenses','💸',`<span class="neg">${fmt(totalExp)}</span>`,mo+' months','#ef4444')}
    ${mCard('fc-c','Net change','🔮',`<span class="${totalNet>=0?'pos':'neg'}">${fmtS(totalNet)}</span>`,'starting from '+fmt(startingBalance),totalNet>=0?'#10b981':'#ef4444')}
  </div>
  <div class="card ci" style="margin-bottom:18px">
    <div class="ct">📈 Monthly cash flow bars</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${rows.map(r=>`<div>
        <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-bottom:6px"><strong>${r.label}</strong><span style="color:var(--t3)">Run ${fmt(r.running)}</span></div>
        <div style="display:grid;grid-template-columns:90px 1fr 90px;gap:10px;align-items:center;margin-bottom:5px"><span style="font-size:12px;color:#10b981">Income</span><div style="height:10px;background:var(--s2);border-radius:999px;overflow:hidden"><div class="bar" style="height:100%;width:${Math.max(0,(r.income/maxVal)*100)}%;background:#10b981"></div></div><span class="mono pos" style="font-size:12px;text-align:right">${fmt(r.income)}</span></div>
        <div style="display:grid;grid-template-columns:90px 1fr 90px;gap:10px;align-items:center;margin-bottom:5px"><span style="font-size:12px;color:#ef4444">Expenses</span><div style="height:10px;background:var(--s2);border-radius:999px;overflow:hidden"><div class="bar" style="height:100%;width:${Math.max(0,(r.expenses/maxVal)*100)}%;background:#ef4444"></div></div><span class="mono neg" style="font-size:12px;text-align:right">${fmt(r.expenses)}</span></div>
        <div style="display:grid;grid-template-columns:90px 1fr 90px;gap:10px;align-items:center"><span style="font-size:12px;color:${r.net>=0?'#10b981':'#ef4444'}">Net</span><div style="height:10px;background:var(--s2);border-radius:999px;overflow:hidden"><div class="bar" style="height:100%;width:${Math.max(0,(Math.abs(r.net)/maxVal)*100)}%;background:${r.net>=0?'#10b981':'#f59e0b'}"></div></div><span class="mono" style="font-size:12px;text-align:right;color:${r.net>=0?'#10b981':'#ef4444'}">${fmtS(r.net)}</span></div>
      </div>`).join('')}

            <td class="mono pos" style="padding:10px 14px">${fmt(r.income)}</td>

          </tr>`).join('')}

    <div style="margin-top:16px;font-size:14px;color:var(--t3)">Tip: add upcoming paycheck dates and save paycheck amounts in the planner to make this forecast more accurate.</div>

}

function addTagFromSettings(){
  const name=document.getElementById('new-tag-name')?.value.trim();
  if(!name){alert('Enter a tag name');return;}
  if(TAGS.find(t=>t.name.toLowerCase()===name.toLowerCase())){alert('Tag already exists');return;}
  TAGS.push({id:_tagNextId++,name,color:_newTagColor||TAG_COLORS[0]});

function delTag(id){
  if(!confirm('Delete this tag? It will be removed from all transactions.'))return;
  TAGS=TAGS.filter(t=>t.id!==id);

  saveTags();sched();render();
}

function addTxn(){
  const desc=($('t-desc')?.value||'').trim();
  const amt=parseFloat($('t-amt')?.value)||0;
  if(!desc||!amt){alert('Enter description and amount');return;}
  snapshot('Add transaction');
  const finalAmt=_txnType==='expense'?-Math.abs(amt):Math.abs(amt);
  const acctId=parseInt($('t-acct')?.value)||S.accounts[0]?.id;
  const selectedTags=TAGS.filter(tag=>document.getElementById('t-tag-'+tag.id)?.checked).map(tag=>tag.id);
  const manualCat=parseInt($('t-cat')?.value)||null;
  const autoCat=finalAmt<0&&!manualCat?autoAssignCategory(desc):null;
  const catId=manualCat||autoCat||null;
  S.txns.push({id:uid(),date:$('t-date')?.value||TODAY_ISO,desc,catId,amt:finalAmt,acct:acctId,status:$('t-status')?.value||'pending',autopay:$('t-auto')?.checked||false,recurring:$('t-rec')?.checked||false,note:$('t-note')?.value?.trim()||'',tags:selectedTags});
  // Update account balance
  const acct=S.accounts.find(a=>a.id===acctId);
  if(acct)acct.balance=Math.round((acct.balance+finalAmt)*100)/100;
  learnMerchant(desc);
  if((manualCat||autoCat) && finalAmt<0) saveMerchantRule(desc, manualCat||autoCat);
  render();
}

function saveEditTxn(id){
  const t=S.txns.find(x=>x.id===id);if(!t)return;
  snapshot('Edit transaction');
  const desc=($('et-desc')?.value||'').trim();
  const rawAmt=parseFloat($('et-amt')?.value)||0;
  const type=$('et-type')?.value||'expense';
  const newAmt=type==='expense'?-Math.abs(rawAmt):Math.abs(rawAmt);
  const newAcctId=parseInt($('et-acct')?.value)||t.acct;
  const selectedTags=TAGS.filter(tag=>document.getElementById('et-tag-'+tag.id)?.checked).map(tag=>tag.id);
  // Reverse old transaction effect on old account
  const oldAcct=S.accounts.find(a=>a.id===t.acct);
  if(oldAcct)oldAcct.balance=Math.round((oldAcct.balance-t.amt)*100)/100;
  // Apply new amount to new account
  const newAcct=S.accounts.find(a=>a.id===newAcctId);
  if(newAcct)newAcct.balance=Math.round((newAcct.balance+newAmt)*100)/100;
  // Save all fields
  t.desc=desc||t.desc;t.amt=newAmt;t.date=$('et-date')?.value||t.date;
  t.catId=parseInt($('et-cat')?.value)||autoAssignCategory(desc)||null;t.acct=newAcctId;
  t.status=$('et-status')?.value||t.status;
  t.autopay=$('et-auto')?.checked||false;t.recurring=$('et-rec')?.checked||false;
  t.note=$('et-note')?.value?.trim()||'';
  t.tags=selectedTags;
  if(desc)learnMerchant(desc);
  if(desc && t.catId && t.amt<0) saveMerchantRule(desc,t.catId);
  closeModal();sched();render();
}

// Setup autocomplete after txn form renders
function setupAC_txn(){
  const inp=$('t-desc');if(!inp)return;
  const guessed=autoAssignCategory(inp.value);
  const catSel=$('t-cat');
  if(guessed && catSel && !catSel.value) catSel.value=guessed;
  document.querySelectorAll('.ac-drop').forEach(el=>el.remove());
  const val=inp.value.toLowerCase();
  if(!val||val.length<1)return;
  const matches=MERCHANTS.filter(m=>m.toLowerCase().includes(val)).slice(0,8);
  if(!matches.length)return;
  let wrap=inp.parentElement;
  wrap.style.position='relative';
  const drop=document.createElement('div');
  drop.className='ac-drop';
  drop.innerHTML=matches.map(m=>`<div class="ac-item" onmousedown="$('t-desc').value='${m.replace(/'/g,"\\'")}';document.querySelectorAll('.ac-drop').forEach(e=>e.remove());return false;">${m}</div>`).join('');
  wrap.appendChild(drop);
}

function toggleBillPaid(id, logDate){
  const b=S.bills.find(x=>x.id===id);if(!b)return;
  snapshot('Mark bill '+(b.paidThisCycle?'unpaid':'paid'));
  b.paidThisCycle=!b.paidThisCycle;
  if(b.paidThisCycle){
    const acctId=b.acctId||S.accounts[0]?.id;
    const acct=S.accounts.find(a=>a.id===acctId);
    const effectiveDate=logDate||TODAY_ISO;
    const alreadyLogged=S.txns.some(t=>t.desc===b.name&&t.amt===-b.amount&&t.date.slice(0,7)===effectiveDate.slice(0,7));
    if(!alreadyLogged){
      S.txns.push({id:uid(),date:effectiveDate,desc:b.name,catId:b.catId||null,amt:-b.amount,acct:acctId,status:'cleared',autopay:b.autopay,recurring:true,note:'Auto-logged from Bills'});

    }
  }
  sched();render();
}

function sumAbsTxns(txns){return txns.reduce((s,t)=>s+Math.abs(t.amt||0),0);}
function monthKeyFromDate(d){return (d||'').slice(0,7);}
function addMonthsToKey(key,offset){
  const [y,m]=key.split('-').map(Number);
  const dt=new Date(y,m-1+offset,1);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
}
function prettyMonthKey(key){
  const [y,m]=key.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleString('en-US',{month:'short',year:'numeric'});
}
function monthlyExpenseSeries(count=6){
  const cur=`${TODAY_YEAR}-${String(TODAY_MONTH+1).padStart(2,'0')}`;
  const keys=[];
  for(let i=count-1;i>=0;i--)keys.push(addMonthsToKey(cur,-i));
  return keys.map(key=>({key,label:new Date(key+'-01').toLocaleString('en-US',{month:'short'}),total:sumAbsTxns(S.txns.filter(t=>t.amt<0&&t.date.startsWith(key)))}));
}
function donutChart(rows,total,size=220){
  if(!rows.length||!total)return `<div style="height:${size}px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:14px">No chart data yet</div>`;
  const r=72,c=2*Math.PI*r; let acc=0;
  const slices=rows.slice(0,5).map(row=>{
    const frac=row.total/total, seg=c*frac, start=acc; acc+=seg;
    return `<circle cx="110" cy="110" r="${r}" fill="none" stroke="${row.color||'#6b7280'}" stroke-width="22" stroke-linecap="round" stroke-dasharray="${seg} ${c-seg}" stroke-dashoffset="${-start}" transform="rotate(-90 110 110)"></circle>`;
  }).join('');
  return `<div style="display:grid;grid-template-columns:minmax(180px,220px) 1fr;gap:18px;align-items:center" class="g2"><div style="position:relative;width:${size}px;max-width:100%;aspect-ratio:1/1;margin:0 auto"><svg viewBox="0 0 220 220" style="width:100%;height:100%"><circle cx="110" cy="110" r="${r}" fill="none" stroke="var(--s2)" stroke-width="22"></circle>${slices}</svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center"><div style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);font-weight:700">Spent</div><div class="mono" style="font-size:26px;font-weight:700;letter-spacing:-.05em">${fmt(total)}</div></div></div><div style="display:flex;flex-direction:column;gap:10px">${rows.slice(0,5).map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px"><div class="chart-legend"><span class="chart-swatch" style="background:${r.color||'#6b7280'}"></span><span style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">${r.name}</span></div><div style="text-align:right"><div class="mono" style="font-size:14px;font-weight:700">${fmt(r.total)}</div><div style="font-size:11px;color:var(--t3)">${Math.round(r.total/total*100)}%</div></div></div>`).join('')}${rows.length>5?`<div style="font-size:12px;color:var(--t3);padding-top:4px">+ ${rows.length-5} more categories</div>`:''}</div></div>`;
}
function barMiniChart(rows,height=220){
  if(!rows.length)return `<div style="height:${height}px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:14px">No trend data yet</div>`;
  const max=Math.max(...rows.map(r=>r.total),1);
  return `<div style="display:flex;align-items:flex-end;gap:10px;height:${height}px;padding-top:10px">${rows.map(r=>{const h=Math.max(10,Math.round(r.total/max*(height-42)));return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div class="mono" style="font-size:11px;color:var(--t3);margin-bottom:6px">${r.total?fmt(r.total):'—'}</div><div title="${r.label}: ${fmt(r.total)}" style="width:100%;max-width:42px;border-radius:14px 14px 6px 6px;background:linear-gradient(180deg,#60a5fa,#a78bfa);height:${h}px;box-shadow:0 8px 16px rgba(96,165,250,.18)"></div><div style="font-size:12px;color:var(--t3);margin-top:8px">${r.label}</div></div>`}).join('')}</div>`;
}
function getReportInsights(totalSpent,catRows,txns){
  const insights=[];
  if(totalSpent<=0)return ['No spending data yet — once you log expenses, your insights will show up here ✨'];
  const avg=totalSpent/Math.max(txns.length,1);
  insights.push(`Average expense: ${fmt(avg)} per transaction`);
  if(catRows[0])insights.push(`${catRows[0].name} is your biggest category at ${Math.round(catRows[0].total/totalSpent*100)}% of spending`);
  const series=monthlyExpenseSeries(2);
  if(series.length===2&&series[0].total>0&&series[1].total>0){
    const diff=series[1].total-series[0].total;
    if(Math.abs(diff)>=1)insights.push(`This month is ${diff>0?fmt(diff)+' higher':fmt(Math.abs(diff))+' lower'} than last month so far`);
  }
  const tagged=txns.filter(t=>(t.tags||[]).length).length;
  if(tagged)insights.push(`${Math.round(tagged/Math.max(txns.length,1)*100)}% of your expense transactions are tagged`);
  const recurring=txns.filter(t=>t.recurring).length;
  if(recurring)insights.push(`${recurring} recurring expense${recurring===1?'':'s'} in this view — good place to look for cutbacks`);
  return insights.slice(0,4);
}

function openTransfer(preFrom,preTo){
  const acctOpts=id=>S.accounts.map(a=>`<option value="${a.id}" ${a.id===id?'selected':''}>${a.name} (${fmt(a.balance)})</option>`).join('');
  // Pre-select BOA → Savings for Keep the Change convenience

  const savId=S.accounts.find(a=>a.type==='savings')?.id||S.accounts[1]?.id;
  modal(`${mT('🔄 Transfer / Keep the Change')}
  <p style="font-size:14px;color:var(--t2);margin-bottom:4px">Moves money between accounts — both balances update and two transactions are recorded.</p>
  <div style="background:#f0fdf6;border:1px solid #a7f3d0;border-radius:10px;padding:10px 14px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:600;color:#065f46;margin-bottom:6px">🏦 Quick: Keep the Change</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[0.50,1,2,5].map(amt=>`<button onclick="quickKTC(${amt})" style="padding:6px 14px;border-radius:8px;background:#d1fae5;border:none;color:#065f46;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">${fmt(amt)}</button>`).join('')}
      <span style="font-size:12px;color:var(--t3);align-self:center">or enter custom below</span>
    </div>
  </div>
  <div style="display:grid;gap:12px;margin-bottom:16px">
    ${sF('From account','tr-from',acctOpts(preFrom||boaId))}
    ${sF('To account','tr-to',acctOpts(preTo||savId))}
    ${iF('Amount','tr-amt','number','0.00','')}
    ${iF('Date','tr-date','date','',TODAY_ISO)}
    ${iF('Note (optional)','tr-note','text','e.g. Keep the Change','')}
  </div>
  ${mF()}${mP('🔄 Transfer','doTransfer()')}`);}

function quickKTC(amt){
  const inp=$('tr-amt');if(inp)inp.value=amt;
  const note=$('tr-note');if(note&&!note.value)note.value='Keep the Change';
}

function doTransfer(){
  const fromId=parseInt($('tr-from')?.value);const toId=parseInt($('tr-to')?.value);
  const amt=parseFloat($('tr-amt')?.value)||0;const date=$('tr-date')?.value||TODAY_ISO;const note=$('tr-note')?.value.trim()||'Transfer';
  if(fromId===toId){alert('Please choose two different accounts');return;}
  if(amt<=0){alert('Please enter an amount greater than zero');return;}
  const fromAcct=S.accounts.find(a=>a.id===fromId);const toAcct=S.accounts.find(a=>a.id===toId);
  if(!fromAcct||!toAcct)return;
  snapshot('Transfer '+fmt(amt));
  // Update balances
  fromAcct.balance=Math.round((fromAcct.balance-amt)*100)/100;
  toAcct.balance=Math.round((toAcct.balance+amt)*100)/100;
  // Record paired transactions
  S.txns.push({id:uid(),date,desc:'Transfer to '+toAcct.name+(note&&note!=='Transfer'?' — '+note:''),catId:null,amt:-amt,acct:fromId,status:'cleared',autopay:false,recurring:false,note});
  S.txns.push({id:uid(),date,desc:'Transfer from '+fromAcct.name+(note&&note!=='Transfer'?' — '+note:''),catId:null,amt:amt,acct:toId,status:'cleared',autopay:false,recurring:false,note});
  closeModal();sched();render();
}

let _pinEntry='';
function pinKey(k){
  if(_pinEntry.length>=4)return;
  _pinEntry+=k;
  updatePinDots();
  if(_pinEntry.length===4)setTimeout(checkPin,120);
}
function pinDel(){_pinEntry=_pinEntry.slice(0,-1);updatePinDots();}
function pinClear(){_pinEntry='';updatePinDots();}
function updatePinDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd-'+i);
    if(d)d.style.background=i<_pinEntry.length?'var(--tx)':'var(--s2)';
  }
}
function checkPin(){
  if(_pinEntry===PROFILE_PIN){
    document.getElementById('pin-overlay')?.remove();
    _pinEntry='';
    doSwitchProf('mine');
  } else {
    const err=document.getElementById('pin-error');
    if(err)err.textContent='Incorrect PIN — try again';
    _pinEntry='';
    updatePinDots();
  }
}

function doSwitchProf(p){
  saveLocal();CUR_PROFILE=p;localStorage.setItem('mf_profile',p);
  const raw=localStorage.getItem(SK+'_'+p);
  if(raw){try{const d=JSON.parse(raw);SYNC_KEYS.forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});if(!S.subscriptions)S.subscriptions=[];if(!S.paychecks)S.paychecks=[];if(!S.bnpl)S.bnpl=[];if(!S.txnF)S.txnF={search:'',period:'',status:'',type:'',recurring:'',acct:'',tag:null};if(S.txnF.tag===undefined)S.txnF.tag=null;}catch(e){S=JSON.parse(JSON.stringify(DEF));}}
  else{S=JSON.parse(JSON.stringify(DEF));}
  ensureStateDefaults();
  updateProfileLabel();if(SCRIPT_URL)loadSheets().then(ok=>{if(ok)render();});render();
}

// ── MORE MENU (mobile) ────────────────────────────────────────────────────────
function openMoreMenu(){
  const others=ALLNAV.filter(n=>!['dashboard','accounts','transactions','creditcards','subscriptions'].includes(n.id));
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end';
  div.onclick=e=>{if(e.target===div)div.remove();};
  div.innerHTML=`<div style="background:var(--sf);width:100%;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:70vh;overflow-y:auto">
    <div style="font-size:14px;font-weight:600;color:var(--t2);margin-bottom:14px">More sections</div>
    ${others.map(item=>`<button onclick="nav('${item.id}');document.querySelectorAll('[style*=flex-end]').forEach(el=>el.remove())" style="width:100%;text-align:left;display:flex;align-items:center;gap:12px;padding:14px;border:none;background:none;font-size:15px;font-weight:500;color:var(--tx);cursor:pointer;border-bottom:1px solid var(--bd);font-family:'Inter',sans-serif"><span style="font-size:20px">${item.icon}</span>${item.label}</button>`).join('')}
  </div>`;
  document.body.appendChild(div);
}

// ── PWA & MOBILE SETUP ────────────────────────────────────────────────────────
function setupPWA(){
  const m={name:(APP_CFG.name||'my finance')+' '+(APP_CFG.emoji||'✦'),short_name:'My Finance',start_url:'.',display:'standalone',background_color:DARK?'#0f0f0e':'#ffffff',theme_color:DARK?'#0f0f0e':'#ffffff',icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>",sizes:'any',type:'image/svg+xml'}]};
  const b=new Blob([JSON.stringify(m)],{type:'application/json'});
  const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);document.head.appendChild(l);
}
function setupMobile(){
  const mob=isMob();
  const tb=$('topbar'),bn=$('botnav'),main=$('main');
  document.body.classList.toggle('is-mobile',mob);
  if(tb)tb.style.display=mob?'flex':'none';
  if(bn)bn.style.display=mob?'flex':'none';
  if(main)main.style.paddingTop=mob?'64px':'2.2rem';
}


function getFunMoneyCategory(){
  return S.cats.find(c=>['my spending $','fun money','treat yourself','no questions asked'].includes((c.name||'').trim().toLowerCase())) || null;
}
function getFunMoneyRemaining(){
  const cat=getFunMoneyCategory();
  if(!cat) return null;
  const limit=(cat.alloc||cat.budget||0);
  return {cat, limit, spent:spent(cat.id), remaining:Math.max(0, Math.round((limit-spent(cat.id))*100)/100)};
}
function getUpcomingCommitted(){
  const upcomingBills=S.bills.filter(b=>!b.paidThisCycle && du(b.due)<=14).reduce((sum,b)=>sum+(b.amount||0),0);
  const upcomingCC=S.creditCards.filter(c=>du(c.due)<=14).reduce((sum,c)=>sum+(c.min||0),0);
  const upcomingBNPL=(S.bnpl||[]).filter(b=>b.remaining>0 && ((b.cadence||'monthly')!=='weekly' ? du(parseInt(b.due||1))<=14 : true)).reduce((sum,b)=>sum+(b.payment||0),0);
  return Math.round((upcomingBills+upcomingCC+upcomingBNPL)*100)/100;
}
function getSafeToSpend(){
  const freedom = Math.max(0, Math.round((totBal()-getUpcomingCommitted())*100)/100);
  const daysLeft=Math.max(1,DIM-TODAY+1);
  return {freedom, perDay: Math.round((freedom/daysLeft)*100)/100, committed:getUpcomingCommitted()};
}
function getReassuranceMessage(){
  const safe=getSafeToSpend();
  const save=totInc()-totExp();
  if(safe.freedom>0 && save>=-100) return {tone:'good', msg:`You're okay 💅 Bills coming up are covered and you still have ${fmt(safe.freedom)} of breathing room.`};
  if(safe.freedom>0) return {tone:'watch', msg:`You're still okay — just be intentional. You have ${fmt(safe.freedom)} left after near-term commitments.`};
  return {tone:'tight', msg:`Things feel tighter right now, so this is a good week to lean on the plan instead of vibes.`};
}


// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  applyDark();updateAppName();buildNav();loadLocal();updateProfileLabel();updateFooter();setupPWA();setupMobile();
  window.addEventListener('resize',setupMobile);
  if(!SCRIPT_URL)$('setup-banner').style.display='block';
  if(SCRIPT_URL){loadSheets().then(ok=>{if(ok)render();else nav('dashboard');});}
  else nav('dashboard');
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
</script>
