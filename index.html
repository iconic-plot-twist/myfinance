input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#10b981;flex-shrink:0;}

// Bill paycheck assignment — find which upcoming paycheck covers a bill
function getBillPC(billId, billDue){
  if(!S.billPCOverrides)S.billPCOverrides={};
  if(S.billPCOverrides[billId])return S.billPCOverrides[billId];
  const dates=S.paycheckDates||[];
  if(!dates.length)return null;
  const sorted=[...dates].sort();
  const today=new Date(2026,2,TODAY);
  for(const d of sorted){
    const dt=new Date(d);
    if(dt>=today&&dt.getDate()<=billDue)return d;
  }
  const future=sorted.filter(d=>new Date(d)>=today);
  if(future.length)return future[0];
  return sorted[sorted.length-1];
}
function setBillPC(billId, val){
  if(!S.billPCOverrides)S.billPCOverrides={};
  if(val==='auto')delete S.billPCOverrides[billId];
  else S.billPCOverrides[billId]=val;
  sched();render();
}

function dueBadge(d){
  if(d===0)return'<span class="badge" style="background:#fef2f2;color:#991b1b">🔴 Today!</span>';
  if(d===1)return'<span class="badge" style="background:#fff7ed;color:#9a3412">🟠 Tomorrow</span>';
  if(d<=5)return`<span class="badge" style="background:#fffbeb;color:#92400e">🟡 ${d}d</span>`;
  return`<span class="badge" style="background:var(--s2);color:var(--t3)">🟢 ${d}d</span>`;
}
function sBadge(s,id){
  const m={
    cleared:`<span class="badge sc" onclick="cycleStatus(${id})">✅ Cleared</span>`,
    pending:`<span class="badge sp" onclick="cycleStatus(${id})">⏳ Pending</span>`,
    progress:`<span class="badge si" onclick="cycleStatus(${id})">🔄 In progress</span>`
  };
  return m[s]||m.pending;
}
function cycleStatus(id){
  const t=S.txns.find(x=>x.id===id);if(!t)return;
  const o=['pending','progress','cleared'];
  t.status=o[(o.indexOf(t.status)+1)%o.length];
  render();
}

function filteredTxns(){
  const f=S.txnF||{};
  let t=[...S.txns];
  if(f.search)t=t.filter(x=>x.desc.toLowerCase().includes(f.search.toLowerCase())||(x.note||'').toLowerCase().includes(f.search.toLowerCase()));
  if(f.status)t=t.filter(x=>x.status===f.status);
  if(f.type==='income')t=t.filter(x=>x.amt>0);
  if(f.type==='expense')t=t.filter(x=>x.amt<0);
  if(f.recurring==='yes')t=t.filter(x=>x.recurring);
  if(f.recurring==='no')t=t.filter(x=>!x.recurring);
  if(f.period){const[y,m]=f.period.split('-');if(m)t=t.filter(x=>x.date.startsWith(f.period));else t=t.filter(x=>x.date.startsWith(y));}
  if(f.acct)t=t.filter(x=>x.acct===parseInt(f.acct));
  return t.sort((a,b)=>b.date.localeCompare(a.date));
}

let _impRows=[];
function handleImp(input){
  const file=input.files[0];if(!file)return;
  const isCSV=file.name.toLowerCase().endsWith('.csv');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      let rows=[];
      if(isCSV){const lines=e.target.result.split('\n').filter(l=>l.trim());const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());rows=lines.slice(1).map(line=>{const vals=line.split(',').map(v=>v.replace(/"/g,'').trim());const o={};hdrs.forEach((h,i)=>o[h]=vals[i]||'');return o;});}
      else{const data=new Uint8Array(e.target.result);const wb=XLSX.read(data,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{raw:false}).map(r=>{const o={};Object.keys(r).forEach(k=>o[k.toLowerCase()]=r[k]);return o;});}
      _impRows=rows.filter(r=>r.description||r.desc).map(r=>({id:uid(),date:r.date||new Date().toISOString().slice(0,10),desc:(r.description||r.desc||'').trim(),amt:parseFloat(r.amount||r.amt||0),catId:null,acct:S.accounts[0]?.id||1,status:(r.status||'pending').toLowerCase(),autopay:(r.autopay||'').toLowerCase()==='yes',recurring:(r.recurring||'').toLowerCase()==='yes',note:r.note||r.notes||''})).filter(r=>r.desc&&!isNaN(r.amt));
      const prev=$('imp-prev');
      if(prev)prev.innerHTML=`<div style="font-size:11px;font-weight:600;color:var(--t3);margin-bottom:6px">PREVIEW (${_impRows.length} rows)</div>`+_impRows.slice(0,4).map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px"><span>${r.desc}</span><span class="mono" style="color:${r.amt>0?'#10b981':'#ef4444'}">${r.amt>0?'+':''}${fmt(r.amt)}</span></div>`).join('');
    }catch(e){const err=$('imp-err');if(err){err.textContent='Could not read: '+e.message;err.style.display='block';}_impRows=[];}
  };
  if(isCSV)reader.readAsText(file);else reader.readAsArrayBuffer(file);
}
function doImport(){if(!_impRows.length){alert('Select a file first');return;}S.txns.push(..._impRows);_impRows=[];closeModal();render();}

// ── PAYCHECK CALC ─────────────────────────────────────────────────────────────
function calcPC(){
  const total=parseFloat($('pc-total')?.value)||0;
  let alloc=0;
  (S.paycheckSplits||[]).forEach(sp=>{
    const amt=sp.type==='amount'?sp.value:Math.round(sp.value/100*total*100)/100;
    alloc+=amt;
    const el=$('sp-prev-'+sp.acctId);if(el)el.textContent=fmt(amt);
  });
  const rem=Math.round((total-alloc)*100)/100;
  const el=$('pc-rem');
  if(el){el.textContent=fmt(Math.abs(rem));el.style.color=rem<0?'#ef4444':rem===0?'#10b981':'var(--t2)';}
}
function calcAlloc(){
  let total=0;S.cats.forEach(c=>{total+=parseFloat($('alloc-'+c.id)?.value)||0;});
  const el=$('alloc-total');if(el)el.textContent=fmt(total);
  const amt=parseFloat($('pc-total')?.value)||0,st=$('alloc-status');
  if(st&&amt>0){const rem=amt-total;st.textContent=rem>=0?'✅ '+fmt(rem)+' unallocated':'⚠️ Over by '+fmt(Math.abs(rem));st.style.color=rem<0?'#ef4444':'#10b981';}
}
function updSplitType(aid,type){const sp=(S.paycheckSplits||[]).find(s=>s.acctId===aid);if(sp)sp.type=type;calcPC();}
function updSplitVal(aid,val){const sp=(S.paycheckSplits||[]).find(s=>s.acctId===aid);if(sp)sp.value=parseFloat(val)||0;calcPC();}

let _dragCatId=null;
function bindEnvDrag(){
  document.querySelectorAll('.env-row[data-cid]').forEach(row=>{
    row.addEventListener('dragstart',e=>{_dragCatId=parseInt(row.dataset.cid);row.classList.add('dragging');});
    row.addEventListener('dragend',e=>{row.classList.remove('dragging');document.querySelectorAll('.env-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.env-row').forEach(r=>r.classList.remove('drag-over'));if(parseInt(row.dataset.cid)!==_dragCatId)row.classList.add('drag-over');});
    row.addEventListener('drop',e=>{
      e.preventDefault();row.classList.remove('drag-over');
      const targetId=parseInt(row.dataset.cid);
      if(!_dragCatId||_dragCatId===targetId)return;
      const order=S.catOrder||S.cats.map(c=>c.id);
      const fi=order.indexOf(_dragCatId),ti=order.indexOf(targetId);
      if(fi<0||ti<0)return;
      order.splice(ti,0,order.splice(fi,1)[0]);
      S.catOrder=[...order];_dragCatId=null;render();
    });
  });
}

function vAdvice(){

  const noAuto=S.creditCards.filter(c=>!c.autopay&&c.balance>0);

    {color:'#ef4444',icon:'💳',title:'Credit utilization alert',body:`Overall: ${util}% — lenders prefer under 30%. ${highCC.length} card${highCC.length!==1?'s':''} over 50%.`,action:highCC.length?`Focus extra payments on ${highCC[0].name} first.`:'',save:util>30?'Paying down to 30% could boost your score significantly.':''},
    noAuto.length?{color:'#3b82f6',icon:'🔁',title:`Set autopay on ${noAuto.length} more cards`,body:`${noAuto.slice(0,3).map(c=>c.name).join(', ')}${noAuto.length>3?` +${noAuto.length-3} more`:''} — one missed payment = $25-40 fee + credit hit.`,action:'Enable minimum payment autopay.',save:'Avoiding one late fee/month saves ~$30-40.'}:null,

    {color:'#f59e0b',icon:'📅',title:'Payment calendar reminder',body:`${S.loans.filter(l=>!l.autopay).length} loans and ${noAuto.length} CCs on manual payment.`,action:'Set phone reminders 5 days before each manual due date.',save:'Never miss = no fees + better credit score.'}

    ${mCard('aa','Total debt','💳',`<span class="neg">${fmt(ccD+loanD)}</span>`,'CCs + loans','#ef4444')}
    ${mCard('ab','Monthly savings','🐷',`<span class="${sav>=0?'pos':'neg'}">${fmtS(sav)}</span>`,'income minus expenses',sav>=0?'#10b981':'#ef4444')}
    ${mCard('ac','Cash buffer','🛡',fmt(bal),Math.round(bal/((exp/TODAY)*31))+'mo of expenses','#3b82f6')}
  </div>
  ${tips.map(t=>`<div class="card ci" style="margin-bottom:12px;border-left:4px solid ${t.color}">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:22px">${t.icon}</span><h3 style="font-size:15px;font-weight:600">${t.title}</h3></div>
    <p style="font-size:14px;color:var(--t2);line-height:1.6">${t.body}</p>
    ${t.action?`<p style="font-size:13px;font-weight:500;margin-top:8px">→ ${t.action}</p>`:''}
    ${t.save?`<p style="font-size:12px;font-weight:600;margin-top:6px;color:${t.color}">💡 ${t.save}</p>`:''}
  </div>`).join('')}`;
}

let _tt='expense';
function setTT(t){
  _tt=t;
  const eb=$('btn-exp'),ib=$('btn-inc');if(!eb||!ib)return;
  if(t==='expense'){eb.style.cssText='flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;border:2px solid #ef4444;background:#fef2f2;color:#991b1b;cursor:pointer;font-family:inherit';ib.style.cssText='flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;border:2px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;font-family:inherit';}
  else{ib.style.cssText='flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;border:2px solid #10b981;background:#f0fdf4;color:#065f46;cursor:pointer;font-family:inherit';eb.style.cssText='flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;border:2px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;font-family:inherit';}
}
function addTxn(){
  const desc=$('t-desc')?.value.trim(),raw=parseFloat($('t-amt')?.value);
  if(!desc||isNaN(raw)){alert('Fill in description and amount 😊');return;}
  const amt=_tt==='expense'?-Math.abs(raw):Math.abs(raw);
  const catId=parseInt($('t-cat')?.value)||null,acctId=parseInt($('t-acct')?.value)||S.accounts[0]?.id;
  S.txns.push({id:uid(),date:$('t-date')?.value,desc,catId,amt,acct:acctId,status:$('t-status')?.value||'pending',autopay:$('t-auto')?.checked||false,recurring:$('t-rec')?.checked||false,note:$('t-note')?.value.trim()||''});
  const a=S.accounts.find(x=>x.id===acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
  render();
}
function delTxn(id){const t=S.txns.find(x=>x.id===id);if(t){const a=S.accounts.find(x=>x.id===t.acct);if(a)a.balance=Math.round((a.balance-t.amt)*100)/100;}S.txns=S.txns.filter(x=>x.id!==id);render();}
function delBill(id){if(!confirm('Delete bill?'))return;S.bills=S.bills.filter(b=>b.id!==id);render();}
function delCat(id){if(!confirm('Delete envelope?'))return;S.cats=S.cats.filter(c=>c.id!==id);render();}
function delLoan(id){if(!confirm('Delete loan?'))return;S.loans=S.loans.filter(l=>l.id!==id);render();}
function applyPaycheck(){
  const total=parseFloat($('pc-total')?.value)||0,date=$('pc-date')?.value;
  (S.paycheckSplits||[]).forEach(sp=>{
    const amt=sp.type==='amount'?sp.value:Math.round(sp.value/100*total*100)/100;
    if(amt<=0)return;
    const a=S.accounts.find(x=>x.id===sp.acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
    S.txns.push({id:uid(),date,desc:'Paycheck split',catId:null,amt,acct:sp.acctId,status:'cleared',autopay:false,recurring:true,note:sp.type==='amount'?fmt(amt):sp.value+'%'});
  });
  S.cats.forEach(c=>{const v=parseFloat($('alloc-'+c.id)?.value)||0;c.alloc=Math.round(v*100)/100;});
  nav('dashboard');
}

function saveTxn(id){
  const t=S.txns.find(x=>x.id===id);if(!t)return;
  const raw=parseFloat($('et-a')?.value)||0,old=t.amt;
  t.desc=$('et-d')?.value.trim()||t.desc;
  t.amt=window._ett==='expense'?-Math.abs(raw):Math.abs(raw);
  t.date=$('et-dt')?.value||t.date;t.catId=parseInt($('et-c')?.value)||null;
  const newAid=parseInt($('et-ac')?.value)||t.acct;
  if(newAid!==t.acct){const oa=S.accounts.find(x=>x.id===t.acct);if(oa)oa.balance=Math.round((oa.balance-old)*100)/100;const na=S.accounts.find(x=>x.id===newAid);if(na)na.balance=Math.round((na.balance+t.amt)*100)/100;t.acct=newAid;}
  else{const a=S.accounts.find(x=>x.id===t.acct);if(a)a.balance=Math.round((a.balance-old+t.amt)*100)/100;}
  t.status=$('et-s')?.value||t.status;t.autopay=$('et-auto')?.checked||false;t.recurring=$('et-rec')?.checked||false;t.note=$('et-n')?.value.trim()||'';

function doTransfer(){
  const fromId=parseInt($('tr-from')?.value);
  const toId=parseInt($('tr-to')?.value);
  const amt=parseFloat($('tr-amt')?.value)||0;
  const date=$('tr-date')?.value||'2026-03-26';
  const note=$('tr-note')?.value.trim()||'';
  if(fromId===toId){alert('Please choose two different accounts');return;}
  if(amt<=0){alert('Please enter an amount');return;}
  const fromAcct=S.accounts.find(a=>a.id===fromId);
  const toAcct=S.accounts.find(a=>a.id===toId);
  if(!fromAcct||!toAcct)return;
  // Debit from source
  fromAcct.balance=Math.round((fromAcct.balance-amt)*100)/100;
  S.txns.push({id:uid(),date,desc:'Transfer to '+toAcct.name,catId:null,amt:-amt,acct:fromId,status:'cleared',autopay:false,recurring:false,note:note||'Transfer'});
  // Credit to destination
  toAcct.balance=Math.round((toAcct.balance+amt)*100)/100;
  S.txns.push({id:uid(),date,desc:'Transfer from '+fromAcct.name,catId:null,amt:amt,acct:toId,status:'cleared',autopay:false,recurring:false,note:note||'Transfer'});
  closeModal();render();
}

  if(!SCRIPT_URL)$('setup-banner').style.display='block';
  if(SCRIPT_URL){loadSheets().then(ok=>{if(ok)render();else nav('dashboard');});}

}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
