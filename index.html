<style>
:root{--bg:#f7f6f3;--surface:#fff;--surface2:#f0eee9;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1a1916;--text2:#6b6860;--text3:#a8a69f;}
.dark{--bg:#0f0f0e;--surface:#1a1917;--surface2:#242320;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f5f4f0;--text2:#9a9890;--text3:#6b6860;}
*{box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}
.mono{font-family:'DM Mono',monospace;}
.bar-fill{transition:width .5s cubic-bezier(.4,0,.2,1);}
.card-hover{transition:transform .15s,box-shadow .15s;}
.card-hover:hover{transform:translateY(-2px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-animate{animation:fadeUp .18s ease;}
.status-cleared{background:#f0fdf6;color:#065f46;}
.status-pending{background:#fffbeb;color:#92400e;}
.status-progress{background:#eff6ff;color:#1e40af;}
.dark .status-cleared{background:#052e1c;color:#6ee7b7;}
.dark .status-pending{background:#2d1f00;color:#fcd34d;}
.dark .status-progress{background:#0d1f3c;color:#93c5fd;}
.swatch{transition:transform .12s;}
.swatch:hover{transform:scale(1.15);}
.swatch.sel{outline:3px solid var(--text);transform:scale(1.15);}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;top:-20px;animation:confettiFall linear forwards;z-index:9999;pointer-events:none;}
/* Drag reorder */
.dragging{opacity:.5;}
.drag-over{border-top:2px solid #3b82f6!important;}

/* ── LAYOUT ── */
.app-shell{display:flex;min-height:100vh;}

/* Sidebar - desktop */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;
  display:flex;flex-direction:column;
  z-index:40;overflow-y:auto;
  transition:transform .25s ease;
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:39;}

/* Tablet */
@media(max-width:1024px) and (min-width:769px){
  .sidebar{width:200px;}
  .main-content{margin-left:200px;}
}

/* Mobile */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:260px;box-shadow:var(--shadow-md);}
  .sidebar.open{transform:translateX(0);}
  .sidebar.open ~ .sidebar-overlay{display:block;}
  .main-content{margin-left:0!important;padding:1rem!important;padding-bottom:5.5rem!important;}
  .mobile-nav{display:flex!important;}
  .hide-mobile{display:none!important;}
  .desktop-only{display:none!important;}
  .metrics-grid{grid-template-columns:repeat(2,1fr)!important;}
  .three-col{grid-template-columns:1fr!important;}
  .two-col{grid-template-columns:1fr!important;}
  .four-col{grid-template-columns:repeat(2,1fr)!important;}
  .tbl-wrap{overflow-x:auto;}
  .mobile-stack{grid-template-columns:1fr!important;}
}

/* Tablet adjustments */
@media(max-width:1024px) and (min-width:769px){
  .three-col{grid-template-columns:1fr 1fr!important;}
  .four-col{grid-template-columns:repeat(2,1fr)!important;}
  .metrics-grid{grid-template-columns:repeat(2,1fr)!important;}
}

.main-content{margin-left:220px;flex:1;padding:2rem 2.5rem;max-width:100%;}

/* Mobile nav */
.mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  z-index:50;padding:6px 0 env(safe-area-inset-bottom,6px);
}
.mobile-nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 8px;font-size:10px;font-weight:500;
  color:var(--text3);border:none;background:none;cursor:pointer;
  transition:color .13s;min-width:0;flex:1;
}
.mobile-nav-btn.active{color:var(--text);}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);}
.card-inner{padding:20px 22px;}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:14px;}

/* Metric cards */
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:3px solid var(--accent,#ccc);cursor:pointer;transition:all .15s;}
.metric-card:hover{transform:translateY(-1px);}
.metric-card.hidden-card{opacity:.45;filter:grayscale(.5);}
.metric-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}
.metric-value{font-size:22px;font-weight:600;letter-spacing:-.6px;font-family:'DM Mono',monospace;}
.metric-sub{font-size:12px;color:var(--text3);margin-top:3px;}

/* Inputs */
input,select,textarea{
  font-family:'DM Sans',sans-serif;font-size:14px;
  background:var(--surface);color:var(--text);
  border:1px solid var(--border2);border-radius:10px;
  padding:8px 12px;width:100%;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--text2);box-shadow:0 0 0 3px rgba(0,0,0,.05);}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#10b981;flex-shrink:0;}
input[type=range]{padding:4px 0;border:none;box-shadow:none;accent-color:#10b981;}

/* Buttons */
.btn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:8px 16px;border-radius:10px;border:1px solid var(--border2);cursor:pointer;transition:all .15s;background:var(--surface);color:var(--text);}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn-primary:hover{opacity:.85;}
.btn-sm{padding:5px 12px;font-size:13px;border-radius:8px;}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px;}
.btn-danger{color:#991b1b;border-color:#fecaca;background:#fff8f8;}
.btn-danger:hover{background:#fee2e2;}
.btn-success{color:#065f46;border-color:#a7f3d0;background:#f0fdf6;}

/* Status badges */
.badge{cursor:pointer;display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}

/* Due badges */
.due-today{background:#fef2f2;color:#991b1b;}
.due-soon{background:#fff7ed;color:#9a3412;}
.due-ok{background:#f0fdf4;color:#166534;}
.due-far{background:var(--surface2);color:var(--text3);}

/* Row */
.data-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.data-row:last-child{border-bottom:none;}

/* Nav items */
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 16px;font-size:14px;font-weight:500;
  color:var(--text2);cursor:pointer;
  border-left:2px solid transparent;
  transition:all .13s;user-select:none;
  border-radius:0;
}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--text);background:var(--surface2);border-left-color:var(--text);}
.nav-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:12px 16px 4px;}

/* Toggle */
.toggle-btn{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:10px;}
.toggle-btn button{padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;color:var(--text2);border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .13s;}
.toggle-btn button.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}

/* Pill */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}

/* Env card */
.env-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-top:3px solid var(--cc,#ccc);transition:transform .15s,box-shadow .15s;}
.env-card:hover{transform:translateY(-2px);}

/* CC card */
.cc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-top:3px solid var(--cc,#ccc);cursor:pointer;transition:transform .15s;}
.cc-card:hover{transform:translateY(-2px);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal-box{background:var(--surface);border-radius:20px;padding:24px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:fadeUp .18s ease;}

/* Form helpers */
.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:5px;}
.form-row{display:grid;gap:12px;margin-bottom:12px;}

/* Utility */
.pos{color:#10b981;} .neg{color:#ef4444;} .warn{color:#f59e0b;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.shadow-md{box-shadow:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.06);}

/* Fun gradient header */
.dash-greeting{background:linear-gradient(135deg,#f0fdf4 0%,#e0f2fe 50%,#fdf4ff 100%);border-radius:16px;padding:20px 24px;margin-bottom:20px;border:1px solid var(--border);}
.dark .dash-greeting{background:linear-gradient(135deg,#052e1c 0%,#0c1a2e 50%,#1a0a2e 100%);}

/* Notes textarea */
textarea{resize:vertical;min-height:60px;}
</style>
</head>

  <!-- Main content -->

</div>

let dragNavId=null;
function dragNavStart(e,id){dragNavId=id;e.target.classList.add('dragging');}
function dragNavOver(e){e.preventDefault();}
function dragNavDrop(e,targetId){
  e.preventDefault();
  if(!dragNavId||dragNavId===targetId)return;
  const order=NAV_ORDER||ALL_NAV.map(n=>n.id);
  const from=order.indexOf(dragNavId),to=order.indexOf(targetId);
  if(from<0||to<0)return;
  order.splice(to,0,order.splice(from,1)[0]);
  NAV_ORDER=order;
  localStorage.setItem('mf_nav_order',JSON.stringify(order));
  buildSidebarNav();
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('dragging');
    el.classList.toggle('active',el.dataset.view===S.view);
    el.style.color=el.dataset.view===S.view?'var(--text)':'var(--text2)';
    el.style.background=el.dataset.view===S.view?'var(--surface2)':'';
    el.style.borderLeftColor=el.dataset.view===S.view?'var(--text)':'transparent';
  });
}

function setSyncStatus(s){
  const el=$('sync-status');if(!el)return;
  const map={saving:{t:'⟳ Syncing...',bg:'#dbeafe',c:'#1e40af'},saved:{t:'✓ Saved',bg:'#d1fae5',c:'#065f46'},error:{t:'⚠ Error',bg:'#fee2e2',c:'#991b1b'},offline:{t:'● Offline',bg:'#fef3c7',c:'#92400e'}};
  const m=map[s];if(!m){el.classList.add('hidden');return;}
  el.textContent=m.t;el.style.background=m.bg;el.style.color=m.c;el.classList.remove('hidden');
  if(s==='saved')setTimeout(()=>el.classList.add('hidden'),2000);
}
async function saveToSheets(){
  if(!SCRIPT_URL)return;setSyncStatus('saving');
  try{const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({data:getSaveData(),profile:CURRENT_PROFILE})});const j=await r.json();setSyncStatus(j.success?'saved':'error');}
  catch(e){setSyncStatus('offline');}
}
async function loadFromSheets(){
  if(!SCRIPT_URL)return false;setSyncStatus('saving');
  try{
    const r=await fetch(`${SCRIPT_URL}?action=load&profile=${CURRENT_PROFILE}`);
    const j=await r.json();
    if(j.success&&j.data&&Object.keys(j.data).length>0){
      ['accounts','creditCards','loans','categories','bills','transactions','nextId','forecastMonths','dashMetrics','paycheckSplits'].forEach(k=>{if(j.data[k]!==undefined)S[k]=j.data[k];});
      saveLocal();setSyncStatus('saved');return true;
    }
    setSyncStatus('offline');return false;
  }catch(e){setSyncStatus('offline');return false;}
}
function scheduleSave(){saveLocal();if(syncTimeout)clearTimeout(syncTimeout);syncTimeout=setTimeout(()=>saveToSheets(),1500);}

function getFilteredTxns(){
  const f=S.txnFilters||{};
  let txns=[...S.transactions];
  if(f.search)txns=txns.filter(t=>t.desc.toLowerCase().includes(f.search.toLowerCase())||(t.note||'').toLowerCase().includes(f.search.toLowerCase()));
  if(f.status)txns=txns.filter(t=>t.status===f.status);
  if(f.type==='income')txns=txns.filter(t=>t.amt>0);
  if(f.type==='expense')txns=txns.filter(t=>t.amt<0);
  if(f.recurring==='yes')txns=txns.filter(t=>t.recurring);
  if(f.recurring==='no')txns=txns.filter(t=>!t.recurring);
  if(f.period){
    const[y,m]=f.period.split('-');
    if(m)txns=txns.filter(t=>t.date.startsWith(f.period));
    else txns=txns.filter(t=>t.date.startsWith(y));
  }
  return txns.sort((a,b)=>b.date.localeCompare(a.date));
}

let _importRows=[];
function handleImportFile(input){
  const file=input.files[0];if(!file)return;
  const isCSV=file.name.toLowerCase().endsWith('.csv');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      let rows=[];
      if(isCSV){
        const lines=e.target.result.split('\n').filter(l=>l.trim());
        const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
        rows=lines.slice(1).map(line=>{
          const vals=line.split(',').map(v=>v.replace(/"/g,'').trim());
          const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');
          return obj;
        });
      } else {
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{raw:false});
        rows=rows.map(r=>{const obj={};Object.keys(r).forEach(k=>obj[k.toLowerCase()]=r[k]);return obj;});
      }
      // Parse rows into transactions
      _importRows=rows.filter(r=>r.description||r.desc).map(r=>({
        id:uid(),
        date:r.date||new Date().toISOString().slice(0,10),
        desc:(r.description||r.desc||'').trim(),
        amt:parseFloat(r.amount||r.amt||0),
        catId:null,
        acct:S.accounts[0]?.id||1,
        status:(r.status||'pending').toLowerCase(),
        autopay:(r.autopay||'').toLowerCase()==='yes',
        recurring:(r.recurring||'').toLowerCase()==='yes',
        note:r.note||r.notes||''
      })).filter(r=>r.desc&&!isNaN(r.amt));

      // Show preview
      const prev=$('import-preview');
      const prevContent=$('import-preview-content');
      const count=$('import-count');
      if(prev)prev.style.display='block';
      if(prevContent)prevContent.innerHTML=_importRows.slice(0,5).map(r=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><span>${r.desc}</span><span class="mono" style="color:${r.amt>0?'#10b981':'#ef4444'}">${r.amt>0?'+':''}${fmt(r.amt)}</span></div>`).join('')+((_importRows.length>5)?`<div style="padding:6px 0;color:var(--text3);font-size:12px">...and ${_importRows.length-5} more</div>`:'');
      if(count)count.textContent='✅ Ready to import '+_importRows.length+' transactions';
      const err=$('import-error');if(err)err.style.display='none';
    }catch(e){
      const err=$('import-error');if(err){err.textContent='⚠️ Could not read file: '+e.message;err.style.display='block';}
      _importRows=[];
    }
  };
  if(isCSV)reader.readAsText(file);else reader.readAsArrayBuffer(file);
}

function confirmImport(){
  if(!_importRows.length){alert('No transactions to import. Please select a file first.');return;}
  S.transactions.push(..._importRows);
  _importRows=[];
  closeModal();
  render();
  alert('✅ Imported successfully!');
}

// ── Paycheck calc ─────────────────────────────────────────
function updatePaycheckCalc(){
  const total=parseFloat($('pc-total')?.value)||0;
  if(!total)return;
  const splits=S.paycheckSplits||[];
  let remaining=total;
  let totalFixed=0;
  splits.forEach(sp=>{if(sp.type==='amount')totalFixed+=sp.value;});
  let totalPct=0;
  splits.forEach(sp=>{if(sp.type==='percent')totalPct+=sp.value;});
  splits.forEach(sp=>{
    const el=$('split-preview-'+sp.acctId);
    if(!el)return;
    let amt=sp.type==='amount'?sp.value:Math.round((sp.value/100)*total*100)/100;
    el.textContent=fmt(amt);
  });
  const allocTotal=splits.reduce((s,sp)=>s+(sp.type==='amount'?sp.value:Math.round((sp.value/100)*total*100)/100),0);
  const rem=Math.round((total-allocTotal)*100)/100;
  const remEl=$('pc-remaining');
  if(remEl){remEl.textContent=fmt(Math.abs(rem));remEl.style.color=rem<0?'#ef4444':rem===0?'#10b981':'var(--text2)';}
}

            <td style="padding:10px 14px;font-size:12px;color:var(--text3)">${pcDates.length?'<span style="font-size:11px;background:var(--surface2);padding:2px 8px;border-radius:6px;color:var(--text2)">'+(getBillPaycheck(b.due)||'—')+'</span>':'<span style="color:var(--text3)">Set dates →</span>'}</td><td style="padding:10px 14px"><button onclick="deleteBill(${b.id})" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3)">×</button></td>

      <input type="text" placeholder="Search card name..." value="${(S.ccFilters||{}).search||''}" oninput="applyCCFilter('search',this.value)" style="flex:1;min-width:140px;font-size:13px;padding:7px 10px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);outline:none">
      <select onchange="applyCCFilter('autopay',this.value)" style="font-size:13px;padding:7px 10px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);outline:none">

        <option value="yes" ${((S.ccFilters||{}).autopay==='yes')?'selected':''}>🅐 Autopay only</option>
        <option value="no" ${((S.ccFilters||{}).autopay==='no')?'selected':''}>⚠️ Manual only</option>
      </select>
      <select onchange="applyCCFilter('sortBy',this.value)" style="font-size:13px;padding:7px 10px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);outline:none">
        <option value="due" ${((S.ccFilters||{}).sortBy||'due')==='due'?'selected':''}>Sort: Due date</option>
        <option value="balance" ${((S.ccFilters||{}).sortBy)==='balance'?'selected':''}>Sort: Balance ↓</option>
        <option value="util" ${((S.ccFilters||{}).sortBy)==='util'?'selected':''}>Sort: Utilization ↓</option>
        <option value="name" ${((S.ccFilters||{}).sortBy)==='name'?'selected':''}>Sort: Name A-Z</option>
      </select>
      <button onclick="S.ccFilters={search:'',autopay:'',sortBy:'due'};render()" style="font-size:12px;padding:6px 10px;border-radius:8px;background:none;border:1px solid var(--border);cursor:pointer;color:#ef4444">✕ Clear</button>
    </div>
  </div>
  ${lastPaymentCCs.length?`<div class="card card-inner" style="margin-bottom:16px;border-left:4px solid #f59e0b;background:linear-gradient(135deg,#fffbeb,#fef3c7)">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:24px">🎉</span>
      <div><div style="font-size:15px;font-weight:600;color:#92400e">Almost paid off!</div>
      <div style="font-size:13px;color:#92400e">${lastPaymentCCs.map(c=>c.name).join(', ')} — final payment incoming!</div></div>
      <button onclick="fireConfetti()" style="margin-left:auto;background:#f59e0b;border:none;color:white;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif">🎉 Celebrate!</button>
    </div>
  </div>`:''}
  <div class="metrics-grid" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px">
    ${mCard('cc1','Total debt','💳',`<span style="color:#ef4444">${fmt(totalDebt)}</span>`,S.creditCards.length+' cards','#ef4444')}
    ${mCard('cc2','Total limit','🏦',fmt(totalLimit),'combined credit','#6b7280')}
    ${mCard('cc3','Utilization','📊',`<span style="color:${util>30?'#ef4444':util>10?'#f59e0b':'#10b981'}">${util}%</span>`,util>30?'🔴 High — aim for <30%':'🟢 Healthy',util>30?'#ef4444':'#10b981')}
    ${mCard('cc4','Min payments','💸',`<span style="color:#f59e0b">${fmt(totalMin)}/mo</span>`,'total minimum due','#f59e0b')}
  </div>
  <div style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px"><span>Overall utilization</span><span>${util}% — ideal: under 30%</span></div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px">

      const cf=S.ccFilters||{};
      let ccs=[...S.creditCards];
      if(cf.search)ccs=ccs.filter(c=>c.name.toLowerCase().includes(cf.search.toLowerCase()));
      if(cf.autopay==='yes')ccs=ccs.filter(c=>c.autopay);
      if(cf.autopay==='no')ccs=ccs.filter(c=>!c.autopay);
      const sortFns={due:(a,b)=>daysUntil(a.due)-daysUntil(b.due),balance:(a,b)=>b.balance-a.balance,util:(a,b)=>pct(b.balance,b.limit)-pct(a.balance,a.limit),name:(a,b)=>a.name.localeCompare(b.name)};

          <span style="font-size:13px;font-weight:600">${c.name}</span>
          ${c.autopay?'<span style="font-size:10px;font-weight:600;background:#eff6ff;color:#1e40af;padding:2px 6px;border-radius:10px">🅐</span>':'<span style="font-size:10px;font-weight:600;background:#fffbeb;color:#92400e;padding:2px 6px;border-radius:10px">Manual</span>'}

        <div class="mono" style="font-size:20px;font-weight:600;color:#ef4444">${fmt(c.balance)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">of ${fmt(c.limit)} · ${u}%</div>

        <div style="display:flex;justify-content:space-between;align-items:center">
          ${dueBadge(d)}
          <span style="font-size:11px;color:var(--text3)">Min ${fmt(c.minPayment)}</span>
        </div>
        ${c.totalPayments>0?`<div style="font-size:10px;color:var(--text3);margin-top:5px">${c.paymentsMade}/${c.totalPayments} payments</div>`:''}
      </div>`;
    }).join('')}
    <button onclick="openAddCC()" style="border:2px dashed var(--border2);border-radius:14px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--text3);min-height:120px" onmouseover="this.style.borderColor='var(--text2)'" onmouseout="this.style.borderColor='var(--border2)'">+ Add card</button>
  </div>`;
}

  const fm=S.forecastMonths||6;

  // Build months array

  const baseDate=new Date(2026,2,1); // March 2026
  months.push({l:'Jan',v:800,cur:false});
  months.push({l:'Feb',v:1100,cur:false});
  months.push({l:'Mar',v:projSav,cur:true});
  for(let i=1;i<fm;i++){

    months.push({l:d.toLocaleString('en',{month:'short'}),v:Math.round(projSav*(1+i*.02)*100)/100,cur:false});

function addTxn(){
  const desc=$('t-desc')?.value.trim(),rawAmt=parseFloat($('t-amt')?.value);
  if(!desc||isNaN(rawAmt)){alert('Please fill in description and amount 😊');return;}
  const amt=txnType==='expense'?-Math.abs(rawAmt):Math.abs(rawAmt);
  const catId=parseInt($('t-cat')?.value)||null,acctId=parseInt($('t-acct')?.value)||S.accounts[0].id;
  const note=$('t-note')?.value.trim()||'';
  S.transactions.push({id:uid(),date:$('t-date')?.value,desc,catId,amt,acct:acctId,status:$('t-status')?.value||'pending',autopay:$('t-autopay')?.checked||false,recurring:$('t-recurring')?.checked||false,note});
  const a=S.accounts.find(x=>x.id===acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
  render();
}

function delTxn(id){
  const t=S.transactions.find(x=>x.id===id);
  if(t){const a=S.accounts.find(x=>x.id===t.acct);if(a)a.balance=Math.round((a.balance-t.amt)*100)/100;}
  S.transactions=S.transactions.filter(x=>x.id!==id);render();
}
function deleteBill(id){if(!confirm('Delete this bill?'))return;S.bills=S.bills.filter(b=>b.id!==id);render();}
function deleteCat(id){if(!confirm('Delete this envelope?'))return;S.categories=S.categories.filter(c=>c.id!==id);render();}
function deleteLoan(id){if(!confirm('Delete this loan?'))return;S.loans=S.loans.filter(l=>l.id!==id);render();}

function updateSplitType(acctId,type){
  if(!S.paycheckSplits)S.paycheckSplits=[];
  const sp=S.paycheckSplits.find(s=>s.acctId===acctId);
  if(sp)sp.type=type;else S.paycheckSplits.push({acctId,type,value:0});
  updatePaycheckCalc();
}
function updateSplitValue(acctId,val){
  if(!S.paycheckSplits)S.paycheckSplits=[];
  const sp=S.paycheckSplits.find(s=>s.acctId===acctId);
  if(sp)sp.value=parseFloat(val)||0;else S.paycheckSplits.push({acctId,type:'amount',value:parseFloat(val)||0});
  updatePaycheckCalc();
}
function updateAllocTotal(){
  let total=0;S.categories.forEach(c=>{total+=parseFloat($('alloc-'+c.id)?.value)||0;});
  const el=$('alloc-total');if(el)el.textContent=fmt(total);
  const amt=parseFloat($('pc-total')?.value)||0,st=$('alloc-status');
  if(st&&amt>0){const rem=amt-total;st.textContent=rem>=0?`✅ ${fmt(rem)} unallocated`:`⚠️ Over by ${fmt(Math.abs(rem))}`;st.style.color=rem<0?'#ef4444':'#10b981';}
}

function applyPaycheck(){
  const total=parseFloat($('pc-total')?.value)||0;
  const date=$('pc-date')?.value;
  const splits=S.paycheckSplits||[];
  splits.forEach(sp=>{
    const amt=sp.type==='amount'?sp.value:Math.round((sp.value/100)*total*100)/100;
    if(amt<=0)return;
    const a=S.accounts.find(x=>x.id===sp.acctId);if(a)a.balance=Math.round((a.balance+amt)*100)/100;
    S.transactions.push({id:uid(),date,desc:'Paycheck split',catId:null,amt,acct:sp.acctId,status:'cleared',autopay:false,recurring:true,note:`Split: ${sp.type==='amount'?fmt(amt):sp.value+'%'}`});
  });
  S.categories.forEach(c=>{const v=parseFloat($('alloc-'+c.id)?.value)||0;c.allocated=Math.round(v*100)/100;});
  nav('dashboard');
}

// ── SMART PAYCHECK ASSIGNMENT ────────────────────────────────────────────
function getPaycheckDates(){
  return S.paycheckDates||[];
}
function getBillPaycheck(billDue){
  // Find which paycheck covers this bill
  const dates=getPaycheckDates();
  if(!dates.length)return null;
  const sorted=[...dates].sort();
  // Bill is covered by the last paycheck before its due date
  for(let i=sorted.length-1;i>=0;i--){
    const pd=parseInt(sorted[i].split('-')[2]||sorted[i]);
    if(pd<=billDue)return sorted[i];
  }
  return sorted[sorted.length-1]; // fallback: last paycheck
}

function saveTxn(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  const rawAmt=parseFloat($('et-amt')?.value)||0;
  const oldAmt=t.amt;
  t.desc=$('et-desc')?.value.trim()||t.desc;
  t.amt=window._editType==='expense'?-Math.abs(rawAmt):Math.abs(rawAmt);
  t.date=$('et-date')?.value||t.date;
  t.catId=parseInt($('et-cat')?.value)||null;
  const newAcctId=parseInt($('et-acct')?.value)||t.acct;
  if(newAcctId!==t.acct){
    const oldA=S.accounts.find(x=>x.id===t.acct);if(oldA)oldA.balance=Math.round((oldA.balance-oldAmt)*100)/100;
    const newA=S.accounts.find(x=>x.id===newAcctId);if(newA)newA.balance=Math.round((newA.balance+t.amt)*100)/100;
    t.acct=newAcctId;
  }else{
    const a=S.accounts.find(x=>x.id===t.acct);if(a)a.balance=Math.round((a.balance-oldAmt+t.amt)*100)/100;
  }
  t.status=$('et-status')?.value||t.status;
  t.autopay=$('et-autopay')?.checked||false;
  t.recurring=$('et-recurring')?.checked||false;
  t.note=$('et-note')?.value.trim()||'';
  closeModal();render();
}

  saveLocal();CURRENT_PROFILE=p;localStorage.setItem('mf_profile',p);
  const raw=localStorage.getItem(SAVE_KEY+'_'+p);
  if(raw){try{const d=JSON.parse(raw);['accounts','creditCards','loans','categories','bills','transactions','nextId','forecastMonths','dashMetrics','paycheckSplits'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});}catch(e){S=JSON.parse(JSON.stringify(DEFAULT_DATA));}}
  else{S=JSON.parse(JSON.stringify(DEFAULT_DATA));}
  updateProfileLabel();if(SCRIPT_URL)loadFromSheets().then(loaded=>{if(loaded)render();});
  render();
}

function updateProfileLabel(){const el=$('profile-label');if(el)el.textContent=getProfileName(CURRENT_PROFILE)+' 👤';}

function openMobileMenu(){
  const hiddenViews=JSON.parse(localStorage.getItem('mf_hidden_nav')||'[]');
  const order=NAV_ORDER||ALL_NAV.map(n=>n.id);
  const others=order.map(id=>ALL_NAV.find(n=>n.id===id)).filter(n=>n&&!['dashboard','accounts','transactions','creditcards','advice'].includes(n.id)&&!hiddenViews.includes(n.id));
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end';
  div.onclick=e=>{if(e.target===div)div.remove();};
  div.innerHTML=`<div style="background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));max-height:70vh;overflow-y:auto">
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px">More sections</div>
    ${others.map(item=>`<button onclick="nav('${item.id}');document.querySelector('[style*=rgba]').remove()" style="width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:12px;border:none;background:none;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);font-family:'DM Sans',sans-serif"><span style="font-size:18px">${item.icon}</span>${item.label}</button>`).join('')}
    <button onclick="openNavCustomize();document.querySelector('[style*=rgba]').remove()" style="width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:12px;border:none;background:none;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif"><span style="font-size:18px">⚙️</span>Customize menu</button>
  </div>`;
  document.body.appendChild(div);
}

// ── Mobile layout detection ───────────────────────────────
function setupMobileLayout(){
  const mobile=isMobile();
  const topbar=$('mobile-topbar');
  const bottomnav=$('bottom-nav');
  const main=$('main');
  if(mobile){
    topbar?.style.setProperty('display','flex');
    bottomnav?.style.setProperty('display','flex');
    if(main)main.style.paddingTop='60px';
  }else{
    topbar?.style.setProperty('display','none');
    bottomnav?.style.setProperty('display','none');
    if(main)main.style.paddingTop='1rem';
  }
}

// ── PWA ───────────────────────────────────────────────────
function setupPWA(){
  const manifest={name:'My Finance ✦',short_name:'My Finance',start_url:'.',display:'standalone',background_color:DARK_MODE?'#0f0f0e':'#ffffff',theme_color:DARK_MODE?'#0f0f0e':'#ffffff',icons:[{src:`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>`,sizes:'any',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);
}

// ── Init ──────────────────────────────────────────────────
const fns=[nav,goHome,render,toggleDark,openRenameProfile,saveProfileName,openImport,handleImportFile,confirmImport,addPcDateField,removePcDate,savePcDates,openSetPaycheckDates,applyCCFilter,exportToCSV,openSidebar,closeSidebar,cycleStatus,addTxn,delTxn,deleteBill,deleteCat,deleteLoan,applyPaycheck,updateAllocTotal,updatePaycheckCalc,updateSplitType,updateSplitValue,clearAllData,closeModal,pickCol,toggleMetric,applyFilter,clearFilters,exportToExcel,selectAllTxns,toggleSelectTxn,bulkSetStatus,bulkDelete,setTxnType,fireConfetti,openEditTxn,saveTxn,openEditAcct,saveAcct,openAddAcct,addAcct,openReconcile,toggleCleared,applyReconcile,openAddBill,addBill,openAddCC,addCC,openEditCC,saveCC,deleteCC,openAddLoan,addLoan,openEditLoan,saveLoan,openAddCat,addCat,openEditEnv,saveEnv,openMoveMoney,doMoveMoney,openSetup,saveScriptUrl,openProfileSwitch,switchProfile,openNavCustomize,toggleNavItem,resetNavOrder,dragNavStart,dragNavOver,dragNavDrop,openMobileMenu,saveToSheets];
fns.forEach(f=>{if(f&&f.name)window[f.name]=f;});

function init(){
  applyDark();
  buildSidebarNav();
  loadLocal();
  updateProfileLabel();
  updateSidebarFooter();
  setupPWA();
  setupMobileLayout();
  window.addEventListener('resize',()=>{setupMobileLayout();});
  if(!SCRIPT_URL)$('setup-banner')?.classList.remove('hidden');
  if(SCRIPT_URL){loadFromSheets().then(loaded=>{if(loaded)render();else nav('dashboard');});}
  else{nav('dashboard');}
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}
else{init();}
</script>
